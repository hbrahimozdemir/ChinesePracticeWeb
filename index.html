<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汉语学习 · Çince Öğren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;1,400&family=Space+Mono:wght@400&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

  <style>
    /* ══════════════════════════ LOADING ══════════════════════════ */
    #ls {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      overflow: hidden;
      transition: opacity .9s ease;
    }

    #ls.out {
      opacity: 0;
      pointer-events: none;
    }

    .ls-sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #02020a 0%, #05071a 20%, #0d0b1e 40%, #180c08 65%, #0a0503 100%);
    }

    .ls-stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1.5px 1.5px at 12% 8%, rgba(255, 248, 200, .95) 0%, transparent 100%),
        radial-gradient(1px 1px at 24% 14%, rgba(255, 248, 200, .7) 0%, transparent 100%),
        radial-gradient(2px 2px at 38% 4%, rgba(255, 248, 200, 1) 0%, transparent 100%),
        radial-gradient(1px 1px at 52% 18%, rgba(255, 248, 200, .8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 65% 6%, rgba(255, 248, 200, .9) 0%, transparent 100%),
        radial-gradient(1px 1px at 78% 12%, rgba(255, 248, 200, .6) 0%, transparent 100%),
        radial-gradient(2px 2px at 88% 3%, rgba(255, 248, 200, .85) 0%, transparent 100%),
        radial-gradient(1px 1px at 6% 22%, rgba(255, 248, 200, .5) 0%, transparent 100%),
        radial-gradient(1px 1px at 44% 26%, rgba(255, 248, 200, .45) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 92% 9%, rgba(255, 248, 200, .7) 0%, transparent 100%);
      animation: lsTwinkle 5s ease-in-out infinite alternate;
    }

    @keyframes lsTwinkle {
      0% {
        opacity: .7
      }

      100% {
        opacity: 1
      }
    }

    .ls-moon {
      position: absolute;
      top: 7%;
      right: 12%;
      width: 85px;
      height: 85px;
      border-radius: 50%;
      background: radial-gradient(circle at 36% 34%, #fffef2, #f8e860 42%, #c0a010);
      box-shadow: 0 0 0 1px rgba(248, 232, 96, .1), 0 0 35px rgba(248, 232, 96, .55), 0 0 90px rgba(248, 232, 96, .28), 0 0 170px rgba(248, 232, 96, .09);
      animation: lsMoon 8s ease-in-out infinite alternate;
    }

    @keyframes lsMoon {
      0% {
        box-shadow: 0 0 35px rgba(248, 232, 96, .5), 0 0 80px rgba(248, 232, 96, .22)
      }

      100% {
        box-shadow: 0 0 55px rgba(248, 232, 96, .72), 0 0 130px rgba(248, 232, 96, .38), 0 0 200px rgba(248, 232, 96, .1)
      }
    }

    .ls-dragon {
      position: absolute;
      top: 7%;
      left: 50%;
      transform: translateX(-50%);
      width: min(580px, 92vw);
      z-index: 5;
      filter: drop-shadow(0 0 20px rgba(200, 150, 40, .5));
      animation: lsDragon 6s ease-in-out infinite;
    }

    @keyframes lsDragon {

      0%,
      100% {
        transform: translateX(-50%) translateY(0) rotate(-.8deg)
      }

      50% {
        transform: translateX(-50%) translateY(-22px) rotate(.8deg)
      }
    }

    .ls-land {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 58%;
      z-index: 3;
    }

    .ls-mist {
      position: absolute;
      left: -15%;
      right: -15%;
      border-radius: 50%;
      z-index: 4;
      animation: lsMist linear infinite;
    }

    .ls-mist.a {
      bottom: 20%;
      height: 100px;
      background: radial-gradient(ellipse, rgba(160, 170, 220, .08) 0%, transparent 65%);
      animation-duration: 15s;
    }

    .ls-mist.b {
      bottom: 28%;
      height: 70px;
      background: radial-gradient(ellipse, rgba(160, 170, 220, .06) 0%, transparent 65%);
      animation-duration: 22s;
      animation-delay: -9s;
    }

    .ls-mist.c {
      bottom: 36%;
      height: 50px;
      background: radial-gradient(ellipse, rgba(160, 170, 220, .04) 0%, transparent 65%);
      animation-duration: 30s;
      animation-delay: -17s;
    }

    @keyframes lsMist {
      0% {
        transform: translateX(-10%)scaleX(1)
      }

      50% {
        transform: translateX(10%)scaleX(1.1)
      }

      100% {
        transform: translateX(-10%)scaleX(1)
      }
    }

    .ls-lantern {
      position: absolute;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: lsLant 4.5s ease-in-out infinite alternate;
    }

    .ls-lantern.p1 {
      top: 22%;
      left: 8%
    }

    .ls-lantern.p2 {
      top: 18%;
      right: 9%
    }

    .ls-lantern.p3 {
      top: 28%;
      left: 20%
    }

    @keyframes lsLant {
      0% {
        transform: rotate(-5deg)
      }

      100% {
        transform: rotate(5deg)
      }
    }

    .lnt-cap {
      width: 20px;
      height: 5px;
      background: linear-gradient(90deg, #7a5020, #c09050, #7a5020);
      border-radius: 3px 3px 0 0;
      margin-bottom: -1px
    }

    .lnt-wire {
      width: 1px;
      height: 22px;
      background: rgba(192, 144, 80, .35)
    }

    .lnt-body {
      width: 16px;
      height: 24px;
      border-radius: 40% 40%52%52%;
      background: radial-gradient(ellipse at 35%35%, rgba(255, 120, 40, .95), rgba(180, 20, 10, .98));
      box-shadow: 0 0 10px rgba(255, 100, 30, .65), 0 0 22px rgba(255, 80, 20, .3);
      position: relative;
    }

    .lnt-glow {
      position: absolute;
      inset: -7px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255, 160, 60, .28) 0%, transparent 70%);
      animation: lntGlow 2.2s ease-in-out infinite alternate;
    }

    @keyframes lntGlow {
      0% {
        opacity: .55;
        transform: scale(1)
      }

      100% {
        opacity: 1;
        transform: scale(1.18)
      }
    }

    .lnt-fringe {
      display: flex;
      gap: 2px;
      margin-top: 3px
    }

    .lnt-fringe i {
      display: block;
      width: 1.5px;
      height: 9px;
      background: rgba(200, 48, 42, .55);
      border-radius: 1px
    }

    .ls-text {
      position: relative;
      z-index: 10;
      text-align: center;
      margin-bottom: 8vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .65rem
    }

    .ls-hz {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.8rem, 7.5vw, 5.5rem);
      font-weight: 700;
      color: #f0c84a;
      text-shadow: 0 0 50px rgba(240, 200, 74, .55), 0 2px 10px rgba(0, 0, 0, .85);
      letter-spacing: 8px;
      animation: lsFade 1s .1s ease both
    }

    .ls-lat {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(.7rem, 2vw, .95rem);
      color: rgba(240, 200, 74, .48);
      letter-spacing: 8px;
      animation: lsFade 1s .3s ease both
    }

    .ls-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(1rem, 3vw, 1.45rem);
      color: rgba(255, 248, 230, .88);
      letter-spacing: 5px;
      margin-top: .8rem;
      animation: lsFade 1s .5s ease both
    }

    .ls-tr {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: clamp(.62rem, 1.8vw, .82rem);
      color: rgba(255, 248, 230, .36);
      letter-spacing: 4px;
      animation: lsFade 1s .65s ease both
    }

    @keyframes lsFade {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .ls-dots {
      display: flex;
      gap: .55rem;
      margin-top: 1.2rem;
      animation: lsFade 1s .8s ease both
    }

    .ls-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(240, 200, 74, .22);
      animation: lsDot 1.6s ease-in-out infinite
    }

    .ls-dot:nth-child(1) {
      animation-delay: 0s
    }

    .ls-dot:nth-child(2) {
      animation-delay: .18s
    }

    .ls-dot:nth-child(3) {
      animation-delay: .36s
    }

    .ls-dot:nth-child(4) {
      animation-delay: .54s
    }

    .ls-dot:nth-child(5) {
      animation-delay: .72s
    }

    @keyframes lsDot {

      0%,
      100% {
        background: rgba(240, 200, 74, .18);
        transform: scale(1)
      }

      50% {
        background: rgba(240, 200, 74, 1);
        transform: scale(1.55)
      }
    }

    .ls-frame {
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(240, 200, 74, .08);
      pointer-events: none;
      z-index: 2
    }

    .ls-frame::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(240, 200, 74, .04)
    }

    .lc {
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: rgba(240, 200, 74, .38);
      border-style: solid
    }

    .lc.tl {
      top: 14px;
      left: 14px;
      border-width: 2px 0 0 2px
    }

    .lc.tr {
      top: 14px;
      right: 14px;
      border-width: 2px 2px 0 0
    }

    .lc.bl {
      bottom: 14px;
      left: 14px;
      border-width: 0 0 2px 2px
    }

    .lc.br {
      bottom: 14px;
      right: 14px;
      border-width: 0 2px 2px 0
    }

    /* tiny medallion ornaments on corners */
    .lc::after {
      content: '◆';
      position: absolute;
      font-size: .45rem;
      color: rgba(240, 200, 74, .5);
      line-height: 1
    }

    .lc.tl::after {
      top: -2px;
      left: -2px
    }

    .lc.tr::after {
      top: -2px;
      right: -2px
    }

    .lc.bl::after {
      bottom: -2px;
      left: -2px
    }

    .lc.br::after {
      bottom: -2px;
      right: -2px
    }
  </style>
</head>

  <script>
    /* ════ LOADING ════ */
    window.addEventListener('load', function () {
      setTimeout(function () {
        var l = document.getElementById('ls');
        l.classList.add('out');
        setTimeout(function () { l.style.display = 'none'; }, 950);
      }, 2700);
    });

    /* ════ STAR FIELD ════ */
    (function () {
      var sf = document.getElementById('star-field'); if (!sf) return;
      var f = document.createDocumentFragment();
      for (var i = 0; i < 130; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        var sz = Math.random() < .12 ? 2.2 : Math.random() < .35 ? 1.6 : 1;
        s.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;top:' + (Math.random() * 58) + '%;left:' + (Math.random() * 100) + '%;--op:' + (0.35 + Math.random() * .65) + ';--dur:' + (3 + Math.random() * 5.5) + 's;--dly:-' + (Math.random() * 7) + 's';
        f.appendChild(s);
      }
      sf.appendChild(f);
    })();

    /* ════ LOGO ════ */
    document.getElementById('logo-btn').addEventListener('click', function () {
      var b = document.querySelector('nav button[data-tab="dictionary"]');
      if (b) b.click();
    });

    /* ════ THEME ════ */
    var TK = 'hz-theme', tb = document.getElementById('theme-toggle'), he = document.documentElement;
    function setTheme(t) { he.setAttribute('data-theme', t); tb.textContent = t === 'dark' ? '☀️' : '🌙'; localStorage.setItem(TK, t); }
    setTheme(localStorage.getItem(TK) || 'dark');
    tb.addEventListener('click', function () { setTheme(he.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); });

  /* ════ INITIALIZATION ════ */
  window.addEventListener('load', () => {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }
    }
  });
</script>
