<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汉语学习 · Çince Öğren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #e8b84b;
      --text: #f0ede6;
      --text2: #9a9890;
      --red: #d94f3d;
      --green: #4caf7d;
      --blue: #5b9bd5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }

    /* ── TTS Bar ── */
    #tts-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 1.2rem;
      font-size: 0.6rem;
      letter-spacing: 1px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      color: var(--text2);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text2);
      flex-shrink: 0;
    }

    .dot.ok {
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .dot.err {
      background: var(--red);
    }

    .dot.checking {
      background: var(--accent);
      animation: pulse 0.6s infinite;
    }

    #tts-bar select,
    #tts-bar button.bar-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      padding: 0.16rem 0.42rem;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    #tts-bar button.bar-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #tts-bar button.bar-btn.on {
      border-color: var(--blue);
      color: var(--blue);
    }

    #tts-server-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      padding: 0.16rem 0.5rem;
      border-radius: 4px;
      outline: none;
      width: 260px;
    }

    #tts-server-input:focus {
      border-color: var(--accent);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--surface);
    }

    .logo {
      font-size: 1.4rem;
      font-family: 'Noto Serif SC', serif;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo span {
      color: var(--text2);
      font-size: 0.68rem;
      font-family: 'Space Mono', monospace;
      display: block;
      letter-spacing: 4px;
    }

    nav {
      display: flex;
      gap: 0.2rem;
      margin-left: auto;
      flex-wrap: wrap;
    }

    nav button {
      padding: 0.38rem 0.85rem;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.18s;
      border-radius: 4px;
    }

    nav button:hover {
      color: var(--text);
      border-color: var(--border);
    }

    nav button.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(232, 184, 75, 0.07);
    }

    main {
      flex: 1;
      padding: 1.4rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
    }

    .btn {
      padding: 0.42rem 1rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      border-radius: 6px;
      transition: all 0.14s;
      letter-spacing: 1px;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-accent {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .btn-accent:hover {
      opacity: 0.82;
      color: #000;
    }

    .btn-sm {
      padding: 0.22rem 0.55rem;
      font-size: 0.6rem;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.68rem 1rem 0.68rem 2.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.18s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap .icon {
      position: absolute;
      left: 0.82rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      pointer-events: none;
    }

    .level-pills {
      display: flex;
      gap: 0.32rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.6rem;
      cursor: pointer;
      transition: all 0.14s;
      background: transparent;
      color: var(--text2);
      font-family: 'Space Mono', monospace;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .word-list {
      overflow-y: auto;
      max-height: 450px;
    }

    .word-list::-webkit-scrollbar {
      width: 3px;
    }

    .word-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .word-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.52rem 0.62rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
    }

    .word-row:hover {
      background: var(--surface2);
    }

    .word-row.selected {
      background: rgba(232, 184, 75, 0.08);
      border-color: var(--accent);
    }

    .word-row .hw {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      color: var(--text);
      min-width: 2.3rem;
    }

    .word-row .py {
      font-size: 0.65rem;
      color: var(--accent);
    }

    .word-row .mn {
      font-size: 0.6rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 105px;
    }

    .lv-badge {
      font-size: 0.5rem;
      padding: 0.08rem 0.28rem;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .vol-btn {
      background: rgba(232, 184, 75, 0.08);
      border: 1px solid rgba(232, 184, 75, 0.22);
      color: var(--accent);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.14s;
      flex-shrink: 0;
      padding: 0;
    }

    .vol-btn:hover {
      background: rgba(232, 184, 75, 0.18);
    }

    .vol-btn.playing {
      background: rgba(232, 184, 75, 0.28);
      border-color: var(--accent);
      animation: pulse 0.75s infinite;
    }

    .char-box {
      width: 155px;
      height: 155px;
      border: 2px solid var(--accent);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
    }

    .char-box::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .char-box::after {
      content: '';
      position: absolute;
      height: 100%;
      width: 1px;
      background: var(--border);
    }

    .hanzi-xl {
      font-family: 'Noto Serif SC', serif;
      font-size: 6rem;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    .pinyin-big {
      font-size: 1.55rem;
      color: var(--accent);
      letter-spacing: 2px;
      font-family: 'Space Mono', monospace;
    }

    .sentence-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem;
    }

    .s-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 0.22rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .s-py {
      font-size: 0.68rem;
      color: var(--accent);
      margin-bottom: 0.22rem;
    }

    .s-tr {
      font-size: 0.72rem;
      color: var(--text2);
    }

    #graph-container {
      width: 100%;
      height: 490px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .graph-empty {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text2);
    }

    .graph-empty .big {
      font-family: 'Noto Serif SC', serif;
      font-size: 5rem;
      opacity: 0.07;
    }

    .fc-scene {
      perspective: 1000px;
      width: 285px;
      height: 330px;
      cursor: pointer;
    }

    .fc-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.48s cubic-bezier(.4, 0, .2, 1);
    }

    .fc-inner.flipped {
      transform: rotateY(180deg);
    }

    .fc-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      padding: 1.7rem;
    }

    .fc-front {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .fc-back {
      background: var(--surface2);
      border: 1px solid var(--accent);
      transform: rotateY(180deg);
    }

    .qz-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .qz-opt {
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      font-size: 1.9rem;
      text-align: center;
      transition: all 0.12s;
      color: var(--text);
    }

    .qz-opt:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(232, 184, 75, 0.07);
    }

    .qz-opt.correct {
      border-color: var(--green);
      background: rgba(76, 175, 125, 0.12);
      color: var(--green);
    }

    .qz-opt.wrong {
      border-color: var(--red);
      background: rgba(217, 79, 61, 0.12);
      color: var(--red);
    }

    .qz-opt:disabled {
      cursor: default;
    }

    .score-bar {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }

    .score-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
    }

    .score-dot.hit {
      background: var(--green);
    }

    .score-dot.miss {
      background: var(--red);
    }

    .blocks-area {
      min-height: 64px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      padding: 0.65rem;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s;
    }

    .blocks-area.correct {
      border-color: var(--green);
      background: rgba(76, 175, 125, 0.05);
    }

    .blocks-area.wrong {
      border-color: var(--red);
      background: rgba(217, 79, 61, 0.05);
    }

    .block-btn {
      padding: 0.42rem 0.8rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1.15rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.12s;
    }

    .block-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .block-btn.placed {
      background: rgba(232, 184, 75, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 290px 1fr 285px;
      gap: 1.2rem;
    }

    @media(max-width:1100px) {
      .grid-3 {
        grid-template-columns: 260px 1fr;
      }
    }

    @media(max-width:700px) {
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    .muted {
      color: var(--text2);
      font-size: 0.7rem;
    }

    .tag {
      font-size: 0.57rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .tag-accent {
      border-color: rgba(232, 184, 75, 0.38);
      color: var(--accent);
    }

    .fade-in {
      animation: fadeUp 0.26s ease;
    }

    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      pointer-events: none;
      font-size: 0.7rem;
      z-index: 9999;
      display: none;
    }

    #tooltip .t-hz {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.35rem;
      color: var(--text);
    }

    #tooltip .t-py {
      color: var(--accent);
    }

    #tooltip .t-mn {
      color: var(--text2);
      margin-top: 0.12rem;
      font-size: 0.62rem;
    }

    /* ── Video Cards ── */
    .video-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.52rem 0.65rem;
      text-decoration: none;
      transition: border-color 0.15s;
      margin-bottom: 0.32rem;
    }

    .video-card:hover {
      border-color: var(--red);
    }

    .video-thumb {
      width: 48px;
      height: 34px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a1f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .video-title {
      font-size: 0.62rem;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
    }

    .video-badge {
      font-size: 0.5rem;
      padding: 0.08rem 0.26rem;
      border-radius: 3px;
      background: rgba(217, 79, 61, 0.18);
      color: #e05c4a;
      border: 1px solid rgba(217, 79, 61, 0.3);
      flex-shrink: 0;
    }

    /* ── Anki Tab ── */
    .anki-drop {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }

    .anki-drop:hover,
    .anki-drop.over {
      border-color: var(--accent);
      background: rgba(232, 184, 75, 0.05);
    }

    .anki-drop .big-icon {
      font-size: 2.8rem;
      margin-bottom: 0.65rem;
    }

    .anki-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.65rem;
      font-size: 0.62rem;
      color: var(--text2);
    }

    .anki-stat span {
      color: var(--accent);
      font-weight: 700;
    }

    .anki-card-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.65rem;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.12s;
    }

    .anki-card-row:hover {
      background: var(--surface2);
    }

    .anki-card-row .a-front {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.2rem;
      color: var(--text);
      min-width: 2.5rem;
    }

    .anki-card-row .a-back {
      font-size: 0.65rem;
      color: var(--text2);
      flex: 1;
    }
  </style>
</head>

<body style="display:flex;flex-direction:column;min-height:100vh">

  <!-- TTS Status Bar -->
  <div id="tts-bar">
    <div class="dot checking" id="tts-dot"></div>
    <span id="tts-label">TTS kontrol ediliyor...</span>
    <span style="margin-left:0.5rem;margin-right:0.25rem;opacity:0.4">|</span>
    <span style="opacity:0.5;font-size:0.55rem">SERVER:</span>
    <input id="tts-server-input" type="text" placeholder="https://chinese-study-tts.onrender.com" />
    <button class="bar-btn" id="tts-connect-btn">Bağlan</button>
    <button class="bar-btn" id="tts-test-btn" style="display:none">▶ Test</button>
    <select id="tts-voice-select" style="display:none"></select>
    <button class="bar-btn" id="tts-slow-btn" style="display:none">🐢 Yavaş</button>
  </div>

  <header>
    <div class="logo">汉语学习<span>ÇİNCE ÖĞREN</span></div>
    <nav id="nav">
      <button class="active" data-tab="dictionary">📖 Sözlük</button>
      <button data-tab="flashcards">🃏 Flashcard</button>
      <button data-tab="sentences">🧩 Cümle</button>
      <button data-tab="quiz">❓ Quiz</button>
      <button data-tab="anki">🎴 Anki</button>
    </nav>
  </header>

  <main id="main" style="flex:1;padding:1.4rem;max-width:1400px;margin:0 auto;width:100%"></main>

  <div id="tooltip">
    <div class="t-hz" id="tt-hz"></div>
    <div class="t-py" id="tt-py"></div>
    <div class="t-mn" id="tt-mn"></div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════
    //  CONFIG — Render deploy sonrası kendi URL'ini localStorage'a kaydeder
    // ══════════════════════════════════════════════════════════════
    const CONFIG_KEY = 'tts_server_url';

    function getSavedServer() {
      return localStorage.getItem(CONFIG_KEY) || '';
    }
    function saveServer(url) {
      localStorage.setItem(CONFIG_KEY, url.trim().replace(/\/$/, ''));
    }

    // ══════════════════════════════════════════════════════════════
    //  TTS ENGINE
    // ══════════════════════════════════════════════════════════════
    const TTS = (() => {
      let serverUrl = getSavedServer();
      let mode = 'checking';
      let slow = false;
      let voice = 'zh-CN-XiaoxiaoNeural';
      let activeBtn = null;

      const VOICES = [
        { id: 'zh-CN-XiaoxiaoNeural', label: 'Xiaoxiao – Kadın · Doğal' },
        { id: 'zh-CN-YunxiNeural', label: 'Yunxi – Erkek · Net' },
        { id: 'zh-CN-XiaoyiNeural', label: 'Xiaoyi – Kadın · Canlı' },
        { id: 'zh-CN-YunyangNeural', label: 'Yunyang – Erkek · Güçlü' },
        { id: 'zh-TW-HsiaoChenNeural', label: 'HsiaoChen – Tayvan' },
      ];

      function ui(m, msg) {
        mode = m;
        const dot = document.getElementById('tts-dot');
        const lbl = document.getElementById('tts-label');
        const sel = document.getElementById('tts-voice-select');
        const slow = document.getElementById('tts-slow-btn');
        const test = document.getElementById('tts-test-btn');
        if (!dot) return;
        dot.className = 'dot ' + (m === 'edge' ? 'ok' : m === 'checking' ? 'checking' : 'err');
        lbl.textContent = msg;
        const on = m === 'edge';
        sel.style.display = on ? 'inline' : 'none';
        slow.style.display = on ? 'inline' : 'none';
        test.style.display = on ? 'inline' : 'none';
        if (on) sel.innerHTML = VOICES.map(v => `<option value="${v.id}" ${v.id === voice ? 'selected' : ''}>${v.label}</option>`).join('');
      }

      function markPlay(btn, on) {
        if (activeBtn && activeBtn !== btn) activeBtn.classList.remove('playing');
        if (btn) btn.classList.toggle('playing', on);
        activeBtn = on ? btn : null;
      }

      async function edgeSpeak(text, btn, forceSlowOverride = false) {
        const isSlow = slow || forceSlowOverride;
        const rate = isSlow ? '-40%' : '-10%';
        const url = `${serverUrl}/tts?text=${encodeURIComponent(text)}&voice=${encodeURIComponent(voice)}&rate=${encodeURIComponent(rate)}`;
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const audio = new Audio(URL.createObjectURL(await res.blob()));
        markPlay(btn, true);
        audio.onended = audio.onerror = () => markPlay(btn, false);
        await audio.play();
      }

      function wsSpeak(text, btn, forceSlowOverride = false) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        const isSlow = slow || forceSlowOverride;
        u.lang = 'zh-CN'; u.rate = isSlow ? 0.55 : 0.85;
        const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('zh'));
        if (v) u.voice = v;
        markPlay(btn, true);
        u.onend = u.onerror = () => markPlay(btn, false);
        window.speechSynthesis.speak(u);
      }

      async function check(url) {
        if (!url) { ui('err', '⚠ TTS server girilmedi — yukarıya Render URL\'ini yaz'); return false; }
        ui('checking', 'Bağlanıyor...');
        try {
          const r = await fetch(`${url}/health`, { signal: AbortSignal.timeout(5000) });
          if (r.ok) {
            serverUrl = url;
            saveServer(url);
            ui('edge', `🔊 Edge TTS · ${url.replace('https://', '')}`);
            return true;
          }
        } catch (e) { }
        ui('err', `⚠ Edge TTS bağlanamadı (${url}) — Web Speech aktif`);
        return false;
      }

      return {
        async init() {
          // Input'a kayıtlı URL'i yaz
          const inp = document.getElementById('tts-server-input');
          if (inp && serverUrl) inp.value = serverUrl;

          // Kayıtlı URL varsa otomatik bağlan
          if (serverUrl) await check(serverUrl);
          else ui('err', '⚠ Render URL girilmemiş — aşağıdaki README\'ye bak');

          // Bağlan butonu
          document.getElementById('tts-connect-btn').addEventListener('click', async () => {
            const url = document.getElementById('tts-server-input').value.trim().replace(/\/$/, '');
            if (url) await check(url);
          });
          document.getElementById('tts-server-input').addEventListener('keydown', async e => {
            if (e.key === 'Enter') document.getElementById('tts-connect-btn').click();
          });
          document.getElementById('tts-voice-select').addEventListener('change', e => voice = e.target.value);
          document.getElementById('tts-slow-btn').addEventListener('click', function () {
            slow = !slow; this.classList.toggle('on', slow);
            this.textContent = slow ? '🐢 Yavaş ✓' : '🐢 Yavaş';
          });
          document.getElementById('tts-test-btn').addEventListener('click', () => TTS.speak('你好，我在学习中文。'));
        },
        async speak(text, btn = null, forceSlowOverride = false) {
          if (!text) return;
          try {
            // "edge" devredışı, "ws" (Web Speech) kullanarak çalışması için doğrudan wsSpeak'e düşürüyorum
            // edgeSpeak de duruyor ama çağrılmayacak (veya mode controlünden disable edildi).
            if (mode === 'edge' && false) await edgeSpeak(text, btn, forceSlowOverride); // Disabled per user request
            else wsSpeak(text, btn, forceSlowOverride);
          } catch (e) {
            console.warn('Edge TTS err:', e.message, '→ fallback');
            wsSpeak(text, btn, forceSlowOverride);
          }
        },
      };

    function filterWords() {
      const l = S.hskLevel;
      S.words = l === 'all' ? WORDS : l === '1-2' ? WORDS.filter(w => w.hsk <= 2) : l === '3-4' ? WORDS.filter(w => w.hsk >= 3 && w.hsk <= 4) : WORDS.filter(w => w.hsk >= 5);
    }

    //  D3 GRAPH
    // ══════════════════════════════════════════════════════════════
    let sim = null;

    // Bir bileşik kelimenin tüm karakterlerini döndürür (WORDS'te varsa)
    function compoundChars(comp) {
      const chars = [];
      for (const ch of comp) {
        if (WORDS.find(x => x.hanzi === ch)) chars.push(ch);
      }
      return chars;
    }

    function buildGraph(center) {
      if (!center) return null;
      const nodes = [], links = [], seen = new Set();
      const add = (w, iC = false) => { if (seen.has(w.hanzi)) return; seen.add(w.hanzi); nodes.push({ id: w.hanzi, pinyin: w.pinyin, meaning: w.tr || w.en, hsk: w.hsk, isCenter: iC }); };
      add(center, true);

      // Bileşikleri: karakter bazlı node'lara ayır
      (center.compounds || []).forEach(c => {
        const chars = compoundChars(c);
        if (chars.length >= 2) {
          // Her karakteri ayrı node olarak ekle, aralarında zincir bağlantı kur
          chars.forEach((ch, i) => {
            const w = WORDS.find(x => x.hanzi === ch) || { hanzi: ch, pinyin: '', tr: '', en: '', hsk: center.hsk, compounds: [] };
            add(w);
            if (i > 0) links.push({ source: chars[i - 1], target: ch, compound: c });
            // Merkezi karakterle bağlantı sadece merkez kendisindeyse
            if (ch !== center.hanzi && i === 0) links.push({ source: center.hanzi, target: ch, compound: c });
          });
        } else {
          // Tek karakter compound ya da WORDS'te yoksa eski davranış
          const w = WORDS.find(x => x.hanzi === c) || { hanzi: c, pinyin: '', tr: '', en: '', hsk: center.hsk, compounds: [] };
          add(w);
          links.push({ source: center.hanzi, target: c });
        }
      });

      // Merkez karakteri içeren diğer kelimeler (tek karakter ise)
      WORDS.forEach(w => {
        if (w.hanzi === center.hanzi) return;
        if ((w.compounds || []).includes(center.hanzi)) { add(w); links.push({ source: w.hanzi, target: center.hanzi }); }
        else if (center.hanzi.length === 1 && w.hanzi.includes(center.hanzi) && !seen.has(w.hanzi)) { add(w); links.push({ source: center.hanzi, target: w.hanzi }); }
      });
      return { nodes, links };
    }

    function renderGraph(center) {
      const el = document.getElementById('graph-container'); if (!el) return;
      el.innerHTML = '';
      if (!center) { el.innerHTML = `<div class="graph-empty"><div class="big">学</div><p class="muted">Kelime seçin veya arama yapın</p></div>`; return; }
      const data = buildGraph(center);
      if (!data || !data.nodes.length) { el.innerHTML = `<div class="graph-empty"><p class="muted">Bağlantı bulunamadı</p></div>`; return; }
      const W = el.clientWidth || 700, H = el.clientHeight || 490;
      const svg = d3.select(el).append('svg').attr('viewBox', `0 0 ${W} ${H}`);
      svg.append('defs').append('marker').attr('id', 'arr').attr('viewBox', '0 -5 10 10').attr('refX', 24).attr('refY', 0).attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto').append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', 'rgba(232,184,75,0.45)');
      const g = svg.append('g');
      svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));
      if (sim) sim.stop();
      sim = d3.forceSimulation(data.nodes).force('link', d3.forceLink(data.links).id(d => d.id).distance(105)).force('charge', d3.forceManyBody().strength(-260)).force('center', d3.forceCenter(W / 2, H / 2)).force('collision', d3.forceCollide(44));
      const link = g.append('g').selectAll('line').data(data.links).enter().append('line').attr('stroke', 'rgba(232,184,75,0.28)').attr('stroke-width', 1.5).attr('marker-end', 'url(#arr)');
      const nd = g.append('g').selectAll('g').data(data.nodes).enter().append('g').style('cursor', 'pointer').call(d3.drag().on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }).on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; }).on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));
      nd.append('circle').attr('r', d => d.isCenter ? 35 : 25).attr('fill', d => d.isCenter ? 'rgba(232,184,75,0.14)' : 'rgba(34,34,40,0.96)').attr('stroke', d => d.isCenter ? '#e8b84b' : '#3e3e48').attr('stroke-width', d => d.isCenter ? 2 : 1);
      nd.append('text').attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('font-family', 'Noto Serif SC,serif').attr('font-size', d => d.isCenter ? '1.3rem' : '0.95rem').attr('fill', d => d.isCenter ? '#e8b84b' : '#f0ede6').text(d => d.id);
      nd.append('text').attr('text-anchor', 'middle').attr('y', d => d.isCenter ? 48 : 35).attr('font-family', 'Space Mono,monospace').attr('font-size', '0.5rem').attr('fill', '#9a9890').text(d => d.pinyin);
      nd.on('click', (e, d) => { const w = WORDS.find(x => x.hanzi === d.id); if (w) { S.selected = w; renderGraph(w); renderDetail(); updWL(); } });
      const tt = document.getElementById('tooltip');
      nd.on('mouseover', (e, d) => { document.getElementById('tt-hz').textContent = d.id; document.getElementById('tt-py').textContent = d.pinyin; document.getElementById('tt-mn').textContent = d.meaning || ''; tt.style.display = 'block'; }).on('mousemove', e => { tt.style.left = (e.clientX + 13) + 'px'; tt.style.top = (e.clientY - 8) + 'px'; }).on('mouseout', () => { tt.style.display = 'none'; });
      sim.on('tick', () => { link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y); nd.attr('transform', d => `translate(${d.x},${d.y})`); });
    }

    function render() {
      document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === S.tab));
      if (S.tab === 'dictionary') renderDict();

      else if (S.tab === 'sentences') renderSent();

      else renderAnki();
    }

      return ['all', '1-2', '3-4', '5-6'].map(l => `<button class="pill ${S.hskLevel === l ? 'active' : ''}" data-level="${l}">${l === 'all' ? 'Tümü' : 'HSK ' + l}</button>`).join('');
    }

          <span class="muted">Karakter Ağı</span>
          ${S.selected ? `<span class="tag tag-accent">${S.selected.hanzi} · ${S.selected.pinyin}</span>` : ''}

    function initSent() { const s = SENTENCES[S.sentIdx]; const bl = [...s.blocks]; for (let i = bl.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[bl[i], bl[j]] = [bl[j], bl[i]]; } S.sentAvail = bl; S.sentUser = []; S.sentStatus = 'idle'; }

        </div>
        ${S.sentStatus === 'correct' ? `<div style="text-align:center;margin-top:0.7rem;color:var(--green);font-size:0.82rem">✓ Doğru!</div><div style="text-align:center;color:var(--accent);font-size:0.7rem;margin-top:0.18rem">${s.py}</div>` : S.sentStatus === 'wrong' ? `<div style="text-align:center;margin-top:0.7rem;color:var(--red);font-size:0.78rem">✗ Yanlış, tekrar dene</div>` : ''}

      </div>
    </div>`;
      document.querySelectorAll('[data-src]').forEach(b => b.addEventListener('click', () => { const i = +b.dataset.i, src = b.dataset.src; if (src === 'a') { S.sentUser.push(S.sentAvail.splice(i, 1)[0]); } else { S.sentAvail.push(S.sentUser.splice(i, 1)[0]); } S.sentStatus = 'idle'; renderSent(); }));
      document.getElementById('sc')?.addEventListener('click', () => { S.sentStatus = s.blocks.join('') === S.sentUser.join('') ? 'correct' : 'wrong'; if (S.sentStatus === 'correct') speak(s.cn); renderSent(); });

      document.getElementById('sl')?.addEventListener('click', () => speak(s.cn));

      document.querySelectorAll('[data-si]').forEach(r => r.addEventListener('click', e => { if (e.target.dataset.speak) return; S.sentIdx = +r.dataset.si; S.sentAvail = []; S.sentUser = []; renderSent(); }));
      document.querySelectorAll('[data-speak]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); speak(b.dataset.speak, b); }));
    }

    // ── QUIZ ──────────────────────────────────────────────────────
    function initQuiz() { const pool = S.words.length >= 4 ? S.words : WORDS; const c = pool[S.quizIdx % pool.length]; const w = pool.filter(x => x.hanzi !== c.hanzi).sort(() => 0.5 - Math.random()).slice(0, 3); S.quizOptions = [c, ...w].sort(() => 0.5 - Math.random()); S.quizAnswered = false; S.quizSelected = null; }
    function renderQuiz() {
      if (!S.quizOptions.length) initQuiz();
      const pool = S.words.length >= 4 ? S.words : WORDS, c = pool[S.quizIdx % pool.length];
      document.getElementById('main').innerHTML = `
    <div style="max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:1.1rem">

        ${S.quizAnswered ? `<div style="margin-top:1rem"><div style="color:${S.quizSelected?.hanzi === c.hanzi ? 'var(--green)' : 'var(--red)'};margin-bottom:0.6rem;font-size:0.82rem">${S.quizSelected?.hanzi === c.hanzi ? '✓ Doğru!' : '✗ Yanlış — Doğrusu: ' + c.hanzi}</div><button class="btn btn-accent" id="qn">Sonraki →</button></div>` : ''}

      document.getElementById('qn')?.addEventListener('click', () => { S.quizIdx++; S.quizOptions = []; initQuiz(); renderQuiz(); });
      document.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => { S.hskLevel = p.dataset.level; S.quizIdx = 0; S.quizScore = []; S.quizOptions = []; filterWords(); initQuiz(); renderQuiz(); }));
    }

    // ── ANKI ──────────────────────────────────────────────────────
    async function parseApkg(file) {
      try {
        const buf = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(buf);
        const dbFile = zip.file('collection.anki2') || zip.file('collection.anki21');
        if (!dbFile) { alert('Geçersiz .apkg dosyası — collection.anki2 bulunamadı.'); return; }
        const dbBuf = await dbFile.async('arraybuffer');
        const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` });
        const db = new SQL.Database(new Uint8Array(dbBuf));
        const res = db.exec('SELECT flds, tags FROM notes LIMIT 500');
        if (!res.length) { alert('Kart bulunamadı.'); return; }
        S.ankiCards = res[0].values.map(row => {
          const parts = (row[0] || '').split('\x1f');
          return { front: parts[0] || '', back: parts.slice(1).join(' / ') || '', tags: (row[1] || '').trim() };
        }).filter(c => c.front);
        S.ankiIdx = 0; S.ankiFlipped = false; S.ankiFilter = '';
        db.close();
        renderAnki();
      } catch (e) { console.error(e); alert('Dosya okunamadı: ' + e.message); }
    }

    function renderAnki() {
      const main = document.getElementById('main');
      const cards = S.ankiFilter
        ? S.ankiCards.filter(c => c.front.includes(S.ankiFilter) || c.back.toLowerCase().includes(S.ankiFilter.toLowerCase()))
        : S.ankiCards;

      if (!S.ankiCards.length) {
        main.innerHTML = `
          <div style="max-width:560px;margin:2rem auto;display:flex;flex-direction:column;gap:1.2rem">
            <div class="card" style="text-align:center;padding:2rem">
              <div class="muted" style="font-size:0.58rem;letter-spacing:3px;margin-bottom:1rem">ANKİ ENTEGRASYONU</div>
              <label class="anki-drop" id="anki-drop-zone">
                <div class="big-icon">🎴</div>
                <div style="font-size:0.85rem;color:var(--text);margin-bottom:0.4rem">.apkg dosyası sürükle & bırak</div>
                <div class="muted" style="font-size:0.65rem">veya tıkla ve seç</div>
                <input type="file" accept=".apkg" style="display:none" id="anki-file-input">
              </label>
              <div class="muted" style="margin-top:1rem;font-size:0.62rem">Anki destesi (.apkg) yükle — kartların ön/arka yüzü otomatik okunur</div>
            </div>
          </div>`;
        document.getElementById('anki-file-input').addEventListener('change', e => { if (e.target.files[0]) parseApkg(e.target.files[0]); });
        const dz = document.getElementById('anki-drop-zone');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
        dz.addEventListener('dragleave', () => dz.classList.remove('over'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); if (e.dataTransfer.files[0]) parseApkg(e.dataTransfer.files[0]); });
        return;
      }

      const cur = cards[S.ankiIdx] || cards[0];
      main.innerHTML = `
        <div style="max-width:900px;margin:0 auto;display:grid;grid-template-columns:1fr 300px;gap:1.2rem;align-items:start">
          <div style="display:flex;flex-direction:column;gap:1rem">
            <div style="display:flex;align-items:center;gap:0.65rem;flex-wrap:wrap">
              <span class="anki-stat">Toplam <span>${S.ankiCards.length}</span></span>
              <span class="anki-stat">${S.ankiIdx + 1}/${cards.length}</span>
              <div class="search-wrap" style="flex:1;min-width:160px"><span class="icon">🔍</span><input id="anki-search" type="text" placeholder="kartlarda ara..." value="${S.ankiFilter}" style="width:100%;padding:0.42rem 1rem 0.42rem 2.2rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Space Mono',monospace;font-size:0.7rem;outline:none;"></div>
              <button class="btn btn-sm" id="anki-clear">✕ Sıfırla</button>
            </div>
            <div class="fc-scene" id="anki-fc" style="width:100%;height:260px">
              <div class="fc-inner ${S.ankiFlipped ? 'flipped' : ''}">
                <div class="fc-face fc-front">
                  <div style="font-family:'Noto Serif SC',serif;font-size:3rem;color:var(--accent);text-align:center;line-height:1.2">${cur.front}</div>
                  <button class="vol-btn" id="anki-speak">🔊</button>
                  <div class="muted" style="font-size:0.6rem">tıkla → çevir</div>
                </div>
                <div class="fc-face fc-back">
                  <div style="font-size:0.9rem;color:var(--text);text-align:center;line-height:1.6">${cur.back || '—'}</div>
                  ${cur.tags ? `<div style="font-size:0.55rem;color:var(--text2);margin-top:0.5rem">${cur.tags}</div>` : ''}
                  <button class="vol-btn" id="anki-speak2">🔊</button>
                </div>
              </div>
            </div>
            <div style="display:flex;gap:0.6rem;justify-content:center">
              <button class="btn" id="anki-prev">← Önceki</button>
              <button class="btn btn-accent" id="anki-next">Sonraki →</button>
            </div>
          </div>
          <div class="card" style="padding:0.85rem">
            <div class="muted" style="font-size:0.58rem;letter-spacing:2px;margin-bottom:0.6rem">TÜM KARTLAR (${cards.length})</div>
            <div style="max-height:420px;overflow-y:auto">
              ${cards.map((c, i) => `<div class="anki-card-row ${i === S.ankiIdx ? 'selected' : ''}" data-ai="${i}">
                <span class="a-front">${c.front.slice(0, 6)}</span>
                <span class="a-back">${(c.back || '').slice(0, 35)}</span>
              </div>`).join('')}
            </div>
            <div style="margin-top:0.85rem;text-align:center">
              <label class="btn" style="cursor:pointer">📂 Yeni .apkg
                <input type="file" accept=".apkg" style="display:none" id="anki-reload-input">
              </label>
            </div>
          </div>
        </div>`;

      document.getElementById('anki-fc').addEventListener('click', () => { S.ankiFlipped = !S.ankiFlipped; renderAnki(); });
      document.getElementById('anki-prev').addEventListener('click', e => { e.stopPropagation(); S.ankiIdx = (S.ankiIdx - 1 + cards.length) % cards.length; S.ankiFlipped = false; renderAnki(); });
      document.getElementById('anki-next').addEventListener('click', e => { e.stopPropagation(); S.ankiIdx = (S.ankiIdx + 1) % cards.length; S.ankiFlipped = false; renderAnki(); });
      document.getElementById('anki-speak')?.addEventListener('click', e => { e.stopPropagation(); speak(cur.front); });
      document.getElementById('anki-speak2')?.addEventListener('click', e => { e.stopPropagation(); speak(cur.front); });
      document.getElementById('anki-search').addEventListener('input', e => { S.ankiFilter = e.target.value; S.ankiIdx = 0; S.ankiFlipped = false; renderAnki(); });
      document.getElementById('anki-clear').addEventListener('click', () => { S.ankiCards = []; S.ankiFilter = ''; renderAnki(); });
      document.getElementById('anki-reload-input').addEventListener('change', e => { if (e.target.files[0]) parseApkg(e.target.files[0]); });
      document.querySelectorAll('.anki-card-row').forEach(r => r.addEventListener('click', () => { S.ankiIdx = +r.dataset.ai; S.ankiFlipped = false; renderAnki(); }));
    }

    // ══════════════════════════════════════════════════════════════
    //  BOOT
    // ══════════════════════════════════════════════════════════════
    document.querySelectorAll('#nav button').forEach(b => b.addEventListener('click', () => { S.tab = b.dataset.tab; render(); }));
    window.addEventListener('load', async () => {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      filterWords();
      await TTS.init();
      render();
    });
  </script>
</body>

</html>
