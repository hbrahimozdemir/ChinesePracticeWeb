<!DOCTYPE html>
<html lang="tr" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汉语学习 · Çince Öğren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;700&family=Cinzel:wght@400;600&family=Lora:ital,wght@0,400;1,400&family=Space+Mono:wght@400&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>


</head>

<body style="display:flex;flex-direction:column;min-height:100vh">

  <!-- ════ PERSISTENT BG LAYERS ════ -->
  <div id="orb"></div>

  <!-- Mountain panorama -->
  <div id="mountain-bg">
    <svg viewBox="0 0 1440 400" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
      <defs>
        <linearGradient id="mfar" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(8,5,2,.38)" />
          <stop offset="1" stop-color="rgba(4,2,1,.72)" />
        </linearGradient>
        <linearGradient id="mmid" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(6,3,1,.55)" />
          <stop offset="1" stop-color="rgba(3,1,0,.88)" />
        </linearGradient>
        <linearGradient id="mnear" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="rgba(4,2,0,.72)" />
          <stop offset="1" stop-color="rgba(2,1,0,.96)" />
        </linearGradient>
      </defs>
      <path
        d="M0,400 L0,285 C80,235 185,268 285,202 C385,136 486,186 586,156 C686,126 787,172 888,136 C988,100 1090,152 1190,118 C1290,84 1374,138 1440,110 L1440,400Z"
        fill="url(#mfar)" />
      <path
        d="M0,400 L0,325 C112,270 228,320 344,266 C460,212 580,292 700,252 C820,212 940,280 1060,244 C1180,208 1305,265 1440,238 L1440,400Z"
        fill="url(#mmid)" />
      <path d="M0,400 L0,365 C180,325 360,382 540,346 C720,310 900,376 1080,354 C1200,338 1335,370 1440,352 L1440,400Z"
        fill="url(#mnear)" />
      <!-- Pagodas -->
      <g fill="rgba(3,2,0,.88)">
        <rect x="86" y="285" width="5" height="58" />
        <polygon points="73,285 88.5,260 104,285" />
        <polygon points="77,304 88.5,278 100,304" />
        <rect x="77" y="304" width="23" height="4" />
      </g>
      <g fill="rgba(3,2,0,.82)">
        <rect x="1345" y="280" width="5" height="63" />
        <polygon points="1332,280 1347.5,255 1363,280" />
        <polygon points="1336,299 1347.5,272 1359,299" />
        <rect x="1336" y="299" width="23" height="4" />
      </g>
      <!-- Pines -->
      <g fill="rgba(3,2,0,.78)">
        <polygon points="152,383 165,337 178,383" />
        <polygon points="148,394 165,340 182,394" />
        <rect x="162" y="389" width="6" height="16" />
        <polygon points="196,377 210,330 224,377" />
        <polygon points="192,390 210,333 228,390" />
        <rect x="207" y="385" width="6" height="16" />
      </g>
      <g fill="rgba(3,2,0,.72)">
        <polygon points="1243,381 1258,333 1273,381" />
        <polygon points="1239,393 1258,336 1277,393" />
        <rect x="1255" y="388" width="6" height="16" />
        <polygon points="1288,375 1304,325 1320,375" />
        <polygon points="1284,389 1304,328 1324,389" />
        <rect x="1301" y="384" width="6" height="16" />
      </g>
      <!-- Water shimmer -->
      <path d="M370,393 Q580,388 780,393 Q980,398 1160,391" stroke="rgba(240,200,74,.1)" stroke-width="1" fill="none" />
      <ellipse cx="1090" cy="396" rx="45" ry="5" fill="rgba(240,200,74,.07)" />
    </svg>
  </div>


  <div id="tts-bar" style="display:none"></div>

  <header>
    <div class="logo" id="logo-btn">
      <div class="logo-hanzi">汉语学习</div>
      <div class="logo-right">
        <div class="logo-sub">Çince Öğren</div>
        <div class="logo-quote">學以致用</div>
        <div class="logo-hint">▸ sözlük</div>
      </div>
    </div>
    <nav id="nav">
      <button data-tab="dictionary">📖 Sözlük</button>
      <button data-tab="flashcards">🎴 Kartlar</button>
      <button data-tab="sentences">✍️ Cümleler</button>
      <button data-tab="quiz">🎯 Test</button>
      <button onclick="location.href='reading.html'">📚 Okuma</button>
      <button id="theme-toggle">🌙</button>
    </nav>
  </header>

  <main id="main" style="flex:1;padding:1.4rem;max-width:1400px;margin:0 auto;width:100%"></main>

  <div id="tooltip">
    <div class="t-hz" id="tt-hz"></div>
    <div class="t-py" id="tt-py"></div>
    <div class="t-mn" id="tt-mn"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>

  <script>
    /* ════ LOGO ════ */
    document.getElementById('logo-btn').addEventListener('click', function () {
      var b = document.querySelector('nav button[data-tab="dictionary"]');
      if (b) b.click();
    });

    /* ════ THEME ════ */
    var TK = 'hz-theme', tb = document.getElementById('theme-toggle'), he = document.documentElement;
    function setTheme(t) { he.setAttribute('data-theme', t); tb.textContent = t === 'dark' ? '☀️' : '🌙'; localStorage.setItem(TK, t); }
    setTheme(localStorage.getItem(TK) || 'dark');
    tb.addEventListener('click', function () { setTheme(he.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); });

  /* ════ INITIALIZATION ════ */
  window.addEventListener('load', () => {
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }
    }
  });
</script>

  <div id="char-hover-popup"
    style="display:none;position:fixed;background:rgba(7,13,31,.92);backdrop-filter:blur(16px);border:1px solid rgba(240,200,74,.2);border-radius:2px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:9999;pointer-events:none;width:120px;height:120px;">
    <div id="char-hover-stroke"></div>
  </div>
</body>

</html>
