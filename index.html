<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汉语学习 · Çince Öğren</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- D3 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #e8b84b;
      --accent2: #c05c3a;
      --text: #f0ede6;
      --text2: #9a9890;
      --red: #d94f3d;
      --green: #4caf7d;
      --blue: #5b9bd5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }
    .hanzi { font-family: 'Noto Serif SC', serif; }
    .hanzi-lg { font-family: 'Noto Serif SC', serif; font-size: 7rem; line-height: 1; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      padding: 1.2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--surface);
    }
    .logo { font-size: 1.5rem; font-family: 'Noto Serif SC', serif; color: var(--accent); letter-spacing: 2px; }
    .logo span { color: var(--text2); font-size: 0.8rem; font-family: 'Space Mono', monospace; display: block; letter-spacing: 4px; }

    nav { display: flex; gap: 0.25rem; margin-left: auto; flex-wrap: wrap; }
    nav button {
      padding: 0.45rem 1rem;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
      border-radius: 4px;
    }
    nav button:hover { color: var(--text); border-color: var(--border); }
    nav button.active { color: var(--accent); border-color: var(--accent); background: rgba(232,184,75,0.07); }

    main { flex: 1; padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    /* ── Buttons ── */
    .btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      border-radius: 6px;
      transition: all 0.15s;
      letter-spacing: 1px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    .btn-accent:hover { opacity: 0.85; color: #000; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.65rem; }

    /* ── Search ── */
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap .icon { position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 1rem; }

    /* ── HSK Level Pills ── */
    .level-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .pill {
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--text2);
      font-family: 'Space Mono', monospace;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent); }
    .pill.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

    /* ── Word List ── */
    .word-list { overflow-y: auto; max-height: 500px; }
    .word-list::-webkit-scrollbar { width: 4px; }
    .word-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .word-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .word-row:hover { background: var(--surface2); }
    .word-row.selected { background: rgba(232,184,75,0.08); border-color: var(--accent); }
    .word-row .hw { font-family: 'Noto Serif SC', serif; font-size: 1.4rem; color: var(--text); min-width: 2.5rem; }
    .word-row .py { font-size: 0.7rem; color: var(--accent); flex: 1; }
    .word-row .mn { font-size: 0.65rem; color: var(--text2); max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lv-badge { font-size: 0.55rem; padding: 0.1rem 0.35rem; border-radius: 3px; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }

    /* ── Detail Panel ── */
    .detail-panel { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .char-box {
      width: 180px; height: 180px;
      border: 2px solid var(--accent);
      position: relative;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
    }
    .char-box::before { content: ''; position: absolute; width: 100%; height: 1px; background: var(--border); }
    .char-box::after { content: ''; position: absolute; height: 100%; width: 1px; background: var(--border); }
    .char-box .hanzi-lg { position: relative; z-index: 1; color: var(--text); }

    .pinyin-big { font-size: 1.8rem; color: var(--accent); letter-spacing: 2px; font-family: 'Space Mono', monospace; }
    .meaning-txt { font-size: 0.9rem; color: var(--text2); text-align: center; line-height: 1.7; }

    /* ── Example Sentences ── */
    .sentence-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      width: 100%;
    }
    .sentence-cn { font-family: 'Noto Serif SC', serif; font-size: 1.2rem; color: var(--text); margin-bottom: 0.3rem; }
    .sentence-py { font-size: 0.72rem; color: var(--accent); margin-bottom: 0.3rem; }
    .sentence-tr { font-size: 0.78rem; color: var(--text2); }

    /* ── D3 Graf ── */
    #graph-container {
      width: 100%; height: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }
    #graph-container svg { width: 100%; height: 100%; }
    .graph-empty {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; color: var(--text2);
    }
    .graph-empty .big { font-family: 'Noto Serif SC', serif; font-size: 4rem; opacity: 0.1; }
    .graph-empty p { font-size: 0.8rem; margin-top: 0.5rem; }

    .node-label-zh { font-family: 'Noto Serif SC', serif; }

    /* ── Flashcard ── */
    .flashcard-scene { perspective: 1000px; width: 300px; height: 360px; cursor: pointer; }
    .flashcard-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    }
    .flashcard-inner.flipped { transform: rotateY(180deg); }
    .flashcard-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden;
      border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; padding: 2rem;
    }
    .card-front { background: var(--surface); border: 1px solid var(--border); }
    .card-back { background: var(--surface2); border: 1px solid var(--accent); transform: rotateY(180deg); }

    /* ── Quiz ── */
    .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .quiz-opt {
      padding: 1.2rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      font-size: 2rem;
      text-align: center;
      transition: all 0.15s;
      color: var(--text);
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--accent); background: rgba(232,184,75,0.07); }
    .quiz-opt.correct { border-color: var(--green); background: rgba(76,175,125,0.12); color: var(--green); }
    .quiz-opt.wrong { border-color: var(--red); background: rgba(217,79,61,0.12); color: var(--red); }
    .quiz-opt:disabled { cursor: default; }

    /* ── Score bar ── */
    .score-bar { display: flex; gap: 0.25rem; }
    .score-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
    .score-dot.hit { background: var(--green); }
    .score-dot.miss { background: var(--red); }

    /* ── Sentence Builder ── */
    .blocks-area {
      min-height: 70px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex; flex-wrap: wrap; gap: 0.5rem; padding: 0.75rem;
      align-items: center; justify-content: center;
      transition: border-color 0.2s;
    }
    .blocks-area.correct { border-color: var(--green); background: rgba(76,175,125,0.05); }
    .blocks-area.wrong { border-color: var(--red); background: rgba(217,79,61,0.05); }
    .block-btn {
      padding: 0.5rem 0.9rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .block-btn:hover { border-color: var(--accent); color: var(--accent); }
    .block-btn.placed { background: rgba(232,184,75,0.1); border-color: var(--accent); color: var(--accent); }

    /* ── Volume btn ── */
    .vol-btn {
      background: rgba(232,184,75,0.1);
      border: 1px solid rgba(232,184,75,0.3);
      color: var(--accent);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.15s;
    }
    .vol-btn:hover { background: rgba(232,184,75,0.2); }

    /* ── Grid helpers ── */
    .grid-2 { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: 280px 1fr 320px; gap: 1.5rem; }
    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
      .grid-3 { grid-template-columns: 1fr; }
    }

    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 0.4rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .tag { font-size: 0.6rem; padding: 0.15rem 0.4rem; border-radius: 3px; border: 1px solid var(--border); color: var(--text2); }
    .tag-accent { border-color: rgba(232,184,75,0.4); color: var(--accent); }

    .muted { color: var(--text2); font-size: 0.75rem; }
    hr-line { display: block; height: 1px; background: var(--border); margin: 1rem 0; border: none; }

    input[type=range] { accent-color: var(--accent); }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      pointer-events: none;
      font-size: 0.75rem;
      z-index: 999;
      display: none;
      max-width: 200px;
    }
    #tooltip .t-hz { font-family: 'Noto Serif SC', serif; font-size: 1.5rem; color: var(--text); }
    #tooltip .t-py { color: var(--accent); }
    #tooltip .t-mn { color: var(--text2); margin-top: 0.2rem; font-size: 0.68rem; }

    .loading-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fade-in { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      汉语学习
      <span>ÇİNCE ÖĞREN</span>
    </div>
    <nav id="nav">
      <button class="active" data-tab="dictionary">📖 Sözlük + Graf</button>
      <button data-tab="flashcards">🃏 Flashcard</button>
      <button data-tab="sentences">🧩 Cümle</button>
      <button data-tab="quiz">❓ Quiz</button>
    </nav>
  </header>
  <main id="main"></main>
</div>

<div id="tooltip">
  <div class="t-hz" id="tt-hz"></div>
  <div class="t-py" id="tt-py"></div>
  <div class="t-mn" id="tt-mn"></div>
</div>

  graphData: null,

// ════════════════════════════════════════════════
//  TTS (Web Speech API — Chrome Çincesi en iyi)
// ════════════════════════════════════════════════
function speak(text, rate=0.85) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = rate;
  // prefer a Chinese voice if available
  const voices = window.speechSynthesis.getVoices();
  const cn = voices.find(v => v.lang.startsWith('zh'));
  if (cn) u.voice = cn;
  window.speechSynthesis.speak(u);
}

//  DATA LOADING
//  Try GitHub HSK JSON → fallback to starter data
// ════════════════════════════════════════════════
async function loadData() {
  // Multiple GitHub sources to try
  const sources = [
    'https://raw.githubusercontent.com/gigafiga21/HSK-vocabulary/master/hsk1.json',
  ];
  // We'll build from STARTER_WORDS which is already comprehensive enough
  // and also try to pull the GitHub source for extra words
  state.allWords = STARTER_WORDS;
  state.loading = false;
  filterWords();
  render();

  // Optionally try GitHub (non-blocking)
  try {
    const r = await fetch('https://raw.githubusercontent.com/hsinjuku/hsk-anki-decks/main/HSK%201-6%20combined.json');
    if (r.ok) {
      // leave starter; we have good data
    }
  } catch(e) { /* silently ignore */ }
}

function filterWords() {
  if (state.hskLevel === 'all') {
    state.words = state.allWords;
  } else if (state.hskLevel === '1-2') {
    state.words = state.allWords.filter(w => w.hsk <= 2);
  } else if (state.hskLevel === '3-4') {
    state.words = state.allWords.filter(w => w.hsk >= 3 && w.hsk <= 4);
  } else if (state.hskLevel === '5-6') {
    state.words = state.allWords.filter(w => w.hsk >= 5);
  }
  // Also reset selected if not in filtered
  if (state.selected && !state.words.find(w => w.hanzi === state.selected.hanzi)) {
    state.selected = null;
  }
}

// ════════════════════════════════════════════════
//  D3 GRAPH
// ════════════════════════════════════════════════
let graphSim = null;

function buildGraphData(centerWord) {
  if (!centerWord) return null;
  const nodes = [];
  const links = [];
  const seen = new Set();

  const addNode = (w, isCenter=false) => {
    if (seen.has(w.hanzi)) return;
    seen.add(w.hanzi);
    nodes.push({ id: w.hanzi, pinyin: w.pinyin, meaning: w.tr || w.en, hsk: w.hsk, isCenter });
  };

  addNode(centerWord, true);

  // Add compound words that contain this character
  const compounds = centerWord.compounds || [];
  compounds.forEach(comp => {
    // Find compound in allWords
    let found = state.allWords.find(w => w.hanzi === comp);
    if (!found) {
      // create a synthetic node
      found = { hanzi: comp, pinyin: '', tr: '', en: '', hsk: centerWord.hsk };
    }
    addNode(found);
    links.push({ source: centerWord.hanzi, target: comp, label: comp });
  });

  // Also find words that have centerWord in their compounds
  state.allWords.forEach(w => {
    if (w.hanzi === centerWord.hanzi) return;
    if ((w.compounds || []).includes(centerWord.hanzi)) {
      addNode(w);
      links.push({ source: w.hanzi, target: centerWord.hanzi });
    }
  });

  // Find words sharing a character
  if (centerWord.hanzi.length === 1) {
    state.allWords.forEach(w => {
      if (seen.has(w.hanzi)) return;
      if (w.hanzi.includes(centerWord.hanzi) && w.hanzi !== centerWord.hanzi) {
        addNode(w);
        links.push({ source: centerWord.hanzi, target: w.hanzi });
      }
    });
  }

  return { nodes, links };
}

function renderGraph(centerWord) {
  const container = document.getElementById('graph-container');
  if (!container) return;
  container.innerHTML = '';

  if (!centerWord) {
    container.innerHTML = `
      <div class="graph-empty">
        <div class="big">学</div>
        <p>Solda bir kelime seçin veya arama yapın</p>
        <p class="muted" style="margin-top:0.5rem">Karakterin bağlantıları görünecek</p>
      </div>`;
    return;
  }

  const data = buildGraphData(centerWord);
  if (!data || data.nodes.length === 0) {
    container.innerHTML = `<div class="graph-empty"><p>Bağlantı bulunamadı.</p></div>`;
    return;
  }

  const W = container.clientWidth || 700;
  const H = container.clientHeight || 520;

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .style('width','100%').style('height','100%');

  // Arrow marker
  svg.append('defs').append('marker')
    .attr('id','arrow')
    .attr('viewBox','0 -5 10 10')
    .attr('refX', 28)
    .attr('refY', 0)
    .attr('markerWidth', 6)
    .attr('markerHeight', 6)
    .attr('orient','auto')
    .append('path')
    .attr('d','M0,-5L10,0L0,5')
    .attr('fill','#e8b84b')
    .attr('opacity', 0.6);

  const g = svg.append('g');

  // Zoom
  svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', (e) => g.attr('transform', e.transform)));

  if (graphSim) graphSim.stop();

  graphSim = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d=>d.id).distance(d => d.source.isCenter || d.target.isCenter ? 120 : 80))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide(50));

  const link = g.append('g').selectAll('line')
    .data(data.links).enter().append('line')
    .attr('stroke','#e8b84b').attr('stroke-opacity', 0.35)
    .attr('stroke-width', 1.5)
    .attr('marker-end','url(#arrow)');

  const nodeG = g.append('g').selectAll('g')
    .data(data.nodes).enter().append('g')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) graphSim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) graphSim.alphaTarget(0); d.fx=null; d.fy=null; })
    );

  // Node circles
  nodeG.append('circle')
    .attr('r', d => d.isCenter ? 38 : 28)
    .attr('fill', d => d.isCenter ? 'rgba(232,184,75,0.18)' : 'rgba(34,34,40,0.95)')
    .attr('stroke', d => d.isCenter ? '#e8b84b' : '#3e3e48')
    .attr('stroke-width', d => d.isCenter ? 2 : 1);

  // Hanzi labels
  nodeG.append('text')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','central')
    .attr('font-family','Noto Serif SC, serif')
    .attr('font-size', d => d.isCenter ? '1.4rem' : '1rem')
    .attr('fill', d => d.isCenter ? '#e8b84b' : '#f0ede6')
    .text(d => d.id);

  // Pinyin below
  nodeG.append('text')
    .attr('text-anchor','middle')
    .attr('y', d => d.isCenter ? 52 : 38)
    .attr('font-family','Space Mono, monospace')
    .attr('font-size','0.55rem')
    .attr('fill','#9a9890')
    .text(d => d.pinyin);

  // Click to navigate
  nodeG.on('click', (e, d) => {
    const w = state.allWords.find(word => word.hanzi === d.id);
    if (w) {
      state.selected = w;
      renderGraph(w);
      renderDetail();
    }
  });

  // Tooltip on hover
  const tooltip = document.getElementById('tooltip');
  nodeG.on('mouseover', (e, d) => {
    document.getElementById('tt-hz').textContent = d.id;
    document.getElementById('tt-py').textContent = d.pinyin;
    document.getElementById('tt-mn').textContent = d.meaning || '';
    tooltip.style.display = 'block';
  }).on('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top  = (e.clientY - 10) + 'px';
  }).on('mouseout', () => { tooltip.style.display = 'none'; });

  graphSim.on('tick', () => {
    link
      .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
      .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
    nodeG.attr('transform', d=>`translate(${d.x},${d.y})`);
  });
}

  const main = document.getElementById('main');

  // Update nav
  document.querySelectorAll('#nav button').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === state.tab);

  if (state.loading) {
    main.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:400px;gap:1rem;">
      <div class="loading-spinner"></div><span class="muted">Kelime listesi yükleniyor...</span>

  }

  switch(state.tab) {
    case 'dictionary': renderDictionary(); break;
    case 'flashcards': renderFlashcards(); break;
    case 'sentences':  renderSentences(); break;
    case 'quiz':       renderQuiz(); break;
  }
}

  const q = state.graphSearch.toLowerCase().trim();
  let list = state.words;
  if (q) {
    list = list.filter(w =>
      w.hanzi.includes(q) ||
      w.pinyin.toLowerCase().includes(q) ||
      (w.tr && w.tr.toLowerCase().includes(q)) ||
      (w.en && w.en.toLowerCase().includes(q))

  }
  return list.slice(0, 120);
}

    ${exSentences.length > 0 ? `
    <div style="width:100%">
      <div class="muted" style="margin-bottom:0.5rem;font-size:0.65rem;letter-spacing:2px">ÖRNEK CÜMLELER</div>
      ${exSentences.map(s => `
        <div class="sentence-card" style="margin-bottom:0.5rem">
          <div class="sentence-cn">${s.cn} <button class="vol-btn" style="width:24px;height:24px;font-size:0.75rem;display:inline-flex" onclick="speak('${s.cn.replace(/'/g,"\\'")}')">🔊</button></div>
          <div class="sentence-py">${s.py}</div>
          <div class="sentence-tr">${s.tr}</div>
        </div>`).join('')}
    </div>` : `
    <div style="width:100%">
      <div class="muted" style="margin-bottom:0.5rem;font-size:0.65rem;letter-spacing:2px">MDBG SÖZLÜK</div>
      <a href="https://www.mdbg.net/chinese/dictionary?page=worddict&wdrst=0&wdqt=${encodeURIComponent(w.hanzi)}" 
         target="_blank" class="btn" style="width:100%;text-align:center;display:block">
        🔗 Detaylı bak (mdbg.net)
      </a>
    </div>`}
  </div>`;
}

function renderDetail() {
  const panel = document.getElementById('detail-panel');
  if (panel) {
    panel.innerHTML = renderDetailHTML();
    const vb = document.getElementById('vol-btn');
    if (vb) vb.addEventListener('click', () => state.selected && speak(state.selected.hanzi));
  }
  // compound btn navigation
  document.querySelectorAll('.compound-btn').forEach(b => {
    b.addEventListener('click', () => {
      const w = state.allWords.find(x => x.hanzi === b.dataset.hanzi);
      if (w) { state.selected = w; renderGraph(w); renderDetail(); updateWordList(); }
    });
  });
}

function updateWordList() {
  document.querySelectorAll('.word-row').forEach(r => {
    r.classList.toggle('selected', r.dataset.hanzi === state.selected?.hanzi);
  });
}

// ── FLASHCARDS ──────────────────────────────────
function renderFlashcards() {
  const main = document.getElementById('main');
  const cards = state.words.length > 0 ? state.words : STARTER_WORDS;
  if (state.flashIdx >= cards.length) state.flashIdx = 0;
  const c = cards[state.flashIdx];

  main.innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;gap:1.5rem;padding:2rem 0">
      <div style="display:flex;align-items:center;gap:1rem">
        <div class="level-pills">
          ${['all','1-2','3-4','5-6'].map(l => `
            <button class="pill ${state.hskLevel===l?'active':''}" data-level="${l}">
              ${l==='all'?'Tümü':'HSK '+l}
            </button>`).join('')}
        </div>
        <span class="muted">${state.flashIdx+1}/${cards.length}</span>
      </div>

      <div class="flashcard-scene" id="fc-scene">
        <div class="flashcard-inner ${state.flashFlipped?'flipped':''}">
          <div class="flashcard-face card-front">
            <div class="hanzi-lg" style="color:var(--accent)">${c.hanzi}</div>
            <button class="vol-btn" id="fc-vol">🔊</button>
            <div class="muted" style="font-size:0.65rem;margin-top:0.5rem">Tıkla → çevir</div>
          </div>
          <div class="flashcard-face card-back">
            <div style="text-align:center">
              <div style="font-size:1.6rem;color:var(--accent);font-family:'Space Mono',monospace;margin-bottom:0.5rem">${c.pinyin}</div>
              <div style="font-size:1rem;color:var(--text);margin-bottom:0.3rem">${c.tr||''}</div>
              <div style="font-size:0.8rem;color:var(--text2)">${c.en||''}</div>
            </div>
            ${c.compounds && c.compounds.length>0 ? `
              <div style="font-size:0.65rem;color:var(--text2);text-align:center">
                ${c.compounds.slice(0,4).join('  ')}
              </div>` : ''}
            <div class="tag">HSK ${c.hsk}</div>
            <button class="vol-btn" id="fc-vol2">🔊</button>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:0.75rem">
        <button class="btn" id="fc-prev">← Önceki</button>
        <button class="btn btn-accent" id="fc-next">Sonraki →</button>
      </div>
    </div>`;

  document.getElementById('fc-scene').addEventListener('click', () => {
    state.flashFlipped = !state.flashFlipped;
    renderFlashcards();
  });
  document.getElementById('fc-prev').addEventListener('click', e => {
    e.stopPropagation();
    state.flashIdx = (state.flashIdx - 1 + cards.length) % cards.length;
    state.flashFlipped = false;
    renderFlashcards();
  });
  document.getElementById('fc-next').addEventListener('click', e => {
    e.stopPropagation();
    state.flashIdx = (state.flashIdx + 1) % cards.length;
    state.flashFlipped = false;
    renderFlashcards();
  });
  ['fc-vol','fc-vol2'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.addEventListener('click', e => { e.stopPropagation(); speak(c.hanzi); });
  });
  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      state.hskLevel = p.dataset.level;
      state.flashIdx = 0; state.flashFlipped = false;
      filterWords(); renderFlashcards();
    });
  });
}

// ── SENTENCES ───────────────────────────────────
function renderSentences() {
  const main = document.getElementById('main');
  const sents = EXAMPLE_SENTENCES;
  if (state.sentIdx >= sents.length) state.sentIdx = 0;

  if (state.sentAvail.length === 0 && state.sentUserBlocks.length === 0) {
    // init
    const blocks = [...sents[state.sentIdx].blocks];
    for (let i = blocks.length-1; i>0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [blocks[i],blocks[j]] = [blocks[j],blocks[i]];
    }
    state.sentAvail = blocks;
    state.sentStatus = 'idle';
  }

  const s = sents[state.sentIdx];

  main.innerHTML = `
    <div style="max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem">
      <div class="card">
        <div style="text-align:center;margin-bottom:1.5rem">
          <div class="muted" style="font-size:0.65rem;letter-spacing:3px;margin-bottom:0.5rem">TÜRKÇEDEN ÇİNCEYE</div>
          <div style="font-size:1.4rem;color:var(--text)">${s.tr}</div>
          <div style="font-size:0.7rem;color:var(--text2);margin-top:0.3rem">${state.sentIdx+1}/${sents.length}</div>
        </div>

        <!-- Drop zone -->
        <div class="blocks-area ${state.sentStatus}" id="drop-zone">
          ${state.sentUserBlocks.length===0 ? `<span class="muted">Kelimeleri sıraya diz...</span>` : ''}
          ${state.sentUserBlocks.map((b,i) => `
            <button class="block-btn placed" data-idx="${i}" data-src="user">${b}</button>`).join('')}
        </div>

        <!-- Available blocks -->
        <div style="display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin:1rem 0">
          ${state.sentAvail.map((b,i) => `
            <button class="block-btn" data-idx="${i}" data-src="avail">${b}</button>`).join('')}
        </div>

        <!-- Actions -->
        <div style="display:flex;gap:0.75rem;justify-content:center">
          ${state.sentStatus==='correct'
            ? `<button class="btn" id="sent-listen">🔊 Dinle</button>
               <button class="btn btn-accent" id="sent-next">Sonraki →</button>`
            : `<button class="btn" id="sent-check">✓ Kontrol</button>
               <button class="btn btn-sm" id="sent-reset">↺ Sıfırla</button>`
          }
        </div>

        ${state.sentStatus==='correct' ? `
          <div style="text-align:center;margin-top:1rem;color:var(--green)">✓ Doğru!</div>
          <div style="text-align:center;font-size:0.75rem;color:var(--accent);margin-top:0.3rem">${s.py}</div>
        ` : state.sentStatus==='wrong' ? `
          <div style="text-align:center;margin-top:1rem;color:var(--red)">✗ Yanlış, tekrar dene</div>
        ` : ''}
      </div>

      <!-- All sentences reference -->
      <div class="card" style="padding:1rem">
        <div class="muted" style="font-size:0.65rem;letter-spacing:2px;margin-bottom:0.75rem">TÜM CÜMLELER</div>
        ${sents.map((sen, i) => `
          <div style="display:flex;align-items:center;gap:0.75rem;padding:0.4rem 0;border-bottom:1px solid var(--border);cursor:pointer" data-sent="${i}" class="sent-row">
            <span style="color:var(--text2);font-size:0.65rem;min-width:1.5rem">${i+1}</span>
            <span style="font-family:'Noto Serif SC',serif;color:var(--text)">${sen.cn}</span>
            <span style="color:var(--text2);font-size:0.7rem;flex:1">${sen.tr}</span>
            <button class="vol-btn" style="width:24px;height:24px;font-size:0.7rem" data-cn="${sen.cn}">🔊</button>
          </div>`).join('')}
      </div>
    </div>`;

  // Events
  document.querySelectorAll('[data-src]').forEach(b => {
    b.addEventListener('click', () => {
      const i = +b.dataset.idx;
      const src = b.dataset.src;
      if (src === 'avail') {
        const block = state.sentAvail.splice(i, 1)[0];
        state.sentUserBlocks.push(block);
      } else {
        const block = state.sentUserBlocks.splice(i, 1)[0];
        state.sentAvail.push(block);
      }
      state.sentStatus = 'idle';
      renderSentences();
    });
  });

  document.getElementById('sent-check')?.addEventListener('click', () => {
    const correct = s.blocks.join('') === state.sentUserBlocks.join('');
    state.sentStatus = correct ? 'correct' : 'wrong';
    if (correct) speak(s.cn);
    renderSentences();
  });

  document.getElementById('sent-reset')?.addEventListener('click', () => {
    state.sentAvail = []; state.sentUserBlocks = [];
    renderSentences();
  });

  document.getElementById('sent-listen')?.addEventListener('click', () => speak(s.cn));

  document.getElementById('sent-next')?.addEventListener('click', () => {
    state.sentIdx = (state.sentIdx + 1) % sents.length;
    state.sentAvail = []; state.sentUserBlocks = [];
    renderSentences();
  });

  document.querySelectorAll('.sent-row').forEach(r => {
    r.addEventListener('click', e => {
      if (e.target.dataset.cn) return;
      state.sentIdx = +r.dataset.sent;
      state.sentAvail = []; state.sentUserBlocks = [];
      renderSentences();
    });
  });

  document.querySelectorAll('[data-cn]').forEach(b => {
    b.addEventListener('click', e => { e.stopPropagation(); speak(b.dataset.cn); });
  });
}

// ── QUIZ ────────────────────────────────────────
function initQuiz() {
  const pool = state.words.length >= 4 ? state.words : STARTER_WORDS;
  const correct = pool[state.quizIdx % pool.length];
  const wrong = pool.filter(w => w.hanzi !== correct.hanzi)
    .sort(() => 0.5 - Math.random()).slice(0, 3);
  state.quizOptions = [correct, ...wrong].sort(() => 0.5 - Math.random());
  state.quizAnswered = false;
  state.quizSelected = null;
}

function renderQuiz() {
  const main = document.getElementById('main');
  const pool = state.words.length >= 4 ? state.words : STARTER_WORDS;
  if (state.quizOptions.length === 0) initQuiz();
  const correct = pool[state.quizIdx % pool.length];

  main.innerHTML = `
    <div style="max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:1.5rem">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <div class="level-pills">
          ${['all','1-2','3-4','5-6'].map(l => `
            <button class="pill ${state.hskLevel===l?'active':''}" data-level="${l}">
              ${l==='all'?'Tümü':'HSK '+l}
            </button>`).join('')}
        </div>
      </div>

      <!-- Score -->
      <div class="score-bar">
        ${state.quizScore.slice(-10).map(h => `<div class="score-dot ${h?'hit':'miss'}"></div>`).join('')}
        ${state.quizScore.length > 0 ? `<span class="muted" style="margin-left:0.5rem">${state.quizScore.filter(Boolean).length}/${state.quizScore.length}</span>` : ''}
      </div>

      <div class="card" style="text-align:center">
        <div class="muted" style="font-size:0.65rem;letter-spacing:3px;margin-bottom:1rem">HANGİ KARAKTER?</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:1.5rem">
          <div style="font-size:1.8rem;color:var(--accent);font-family:'Space Mono',monospace">${correct.pinyin}</div>
          <button class="vol-btn" id="qz-vol">🔊</button>
        </div>
        <div style="color:var(--text2);font-size:0.85rem;margin-bottom:1.5rem">${correct.tr || correct.en}</div>

        <div class="quiz-options">
          ${state.quizOptions.map((opt,i) => {
            let cls = '';
            if (state.quizAnswered) {
              if (opt.hanzi === correct.hanzi) cls = 'correct';
              else if (opt.hanzi === state.quizSelected?.hanzi) cls = 'wrong';
            }
            return `<button class="quiz-opt ${cls}" data-idx="${i}" ${state.quizAnswered?'disabled':''}>${opt.hanzi}</button>`;
          }).join('')}
        </div>

        ${state.quizAnswered ? `
          <div style="margin-top:1.25rem">
            <div style="color:${state.quizSelected?.hanzi===correct.hanzi?'var(--green)':'var(--red)'};margin-bottom:0.75rem">
              ${state.quizSelected?.hanzi===correct.hanzi ? '✓ Doğru!' : `✗ Yanlış — Doğrusu: ${correct.hanzi}`}
            </div>
            <button class="btn btn-accent" id="qz-next">Sonraki →</button>
          </div>` : ''}
      </div>
    </div>`;

  document.getElementById('qz-vol')?.addEventListener('click', () => speak(correct.hanzi));

  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.addEventListener('click', () => {
      if (state.quizAnswered) return;
      const opt = state.quizOptions[+b.dataset.idx];
      state.quizSelected = opt;
      state.quizAnswered = true;
      const hit = opt.hanzi === correct.hanzi;
      state.quizScore.push(hit);
      if (hit) speak(correct.hanzi);
      renderQuiz();
    });
  });

  document.getElementById('qz-next')?.addEventListener('click', () => {
    state.quizIdx++;
    state.quizOptions = [];
    initQuiz();
    renderQuiz();
  });

  document.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      state.hskLevel = p.dataset.level;
      state.quizIdx = 0; state.quizScore = []; state.quizOptions = [];
      filterWords(); initQuiz(); renderQuiz();
    });
  });
}

// ════════════════════════════════════════════════
//  NAVIGATION
// ════════════════════════════════════════════════
document.querySelectorAll('#nav button').forEach(b => {
  b.addEventListener('click', () => {
    state.tab = b.dataset.tab;
    render();
  });
});

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
window.addEventListener('load', () => {
  // pre-load voices
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {};
  }
  loadData();
});
</script>
</body>
</html>
