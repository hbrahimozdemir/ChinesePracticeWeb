<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>汉语学习 · Çince Öğren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>


  <style>
    :root {
      --bg: #09090b;
      --surface: #121216;
      --surface2: #1e1e24;
      --border: #2d2d36;
      --accent: #facc15;
      --text: #fafafa;
      --text2: #a1a1aa;
      --red: #ef4444;
      --green: #10b981;
      --blue: #3b82f6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }

    /* ── TTS Bar ── */
    #tts-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.28rem 1.2rem;
      font-size: 0.6rem;
      letter-spacing: 1px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      color: var(--text2);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text2);
      flex-shrink: 0;
    }

    .dot.ok {
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .dot.err {
      background: var(--red);
    }

    .dot.checking {
      background: var(--accent);
      animation: pulse 0.6s infinite;
    }

    #tts-bar select,
    #tts-bar button.bar-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      padding: 0.16rem 0.42rem;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }

    #tts-bar button.bar-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #tts-bar button.bar-btn.on {
      border-color: var(--blue);
      color: var(--blue);
    }

    #tts-server-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      padding: 0.16rem 0.5rem;
      border-radius: 4px;
      outline: none;
      width: 260px;
    }

    #tts-server-input:focus {
      border-color: var(--accent);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--surface);
    }

    .logo {
      font-size: 1.4rem;
      font-family: 'Noto Serif SC', serif;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo span {
      color: var(--text2);
      font-size: 0.68rem;
      font-family: 'Space Mono', monospace;
      display: block;
      letter-spacing: 4px;
    }

    nav {
      display: flex;
      gap: 0.2rem;
      margin-left: auto;
      flex-wrap: wrap;
    }

    nav button {
      padding: 0.38rem 0.85rem;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text2);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.18s;
      border-radius: 4px;
    }

    nav button:hover {
      color: var(--text);
      border-color: var(--border);
    }

    nav button.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(232, 184, 75, 0.07);
    }

    main {
      flex: 1;
      padding: 1.4rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem;
    }
    #flashcard-view .card { max-width: 600px; width: 100%; }
    #det { overflow: hidden; min-width: 0; }
    .pinyin-big { word-break: break-all; overflow-wrap: break-word; max-width: 100%; }
    .char-box { width: auto; min-width: 120px; max-width: 100%; height: auto; min-height: 120px; padding: 1rem; }
    .hanzi-xl { font-size: 5rem; word-break: break-all; max-width: 100%; text-align: center; }

    .btn {
      padding: 0.42rem 1rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      border-radius: 6px;
      transition: all 0.14s;
      letter-spacing: 1px;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-accent {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .btn-accent:hover {
      opacity: 0.82;
      color: #000;
    }

    .btn-sm {
      padding: 0.22rem 0.55rem;
      font-size: 0.6rem;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 0.68rem 1rem 0.68rem 2.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.18s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
    }

    .search-wrap .icon {
      position: absolute;
      left: 0.82rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
      pointer-events: none;
    }

    .level-pills {
      display: flex;
      gap: 0.32rem;
      flex-wrap: wrap;
    }

    .pill {
      padding: 0.18rem 0.55rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 0.6rem;
      cursor: pointer;
      transition: all 0.14s;
      background: transparent;
      color: var(--text2);
      font-family: 'Space Mono', monospace;
    }

    .pill:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .pill.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .word-list {
      overflow-y: auto;
      max-height: 450px;
    }

    .word-list::-webkit-scrollbar {
      width: 3px;
    }

    .word-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .word-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.52rem 0.62rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      border: 1px solid transparent;
    }

    .word-row:hover {
      background: var(--surface2);
    }

    .word-row.selected {
      background: rgba(232, 184, 75, 0.08);
      border-color: var(--accent);
    }

    .word-row .hw {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.3rem;
      color: var(--text);
      min-width: 2.3rem;
    }

    .word-row .py {
      font-size: 0.65rem;
      color: var(--accent);
    }

    .word-row .mn {
      font-size: 0.6rem;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 105px;
    }

    .lv-badge {
      font-size: 0.5rem;
      padding: 0.08rem 0.28rem;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .vol-btn {
      background: rgba(232, 184, 75, 0.08);
      border: 1px solid rgba(232, 184, 75, 0.22);
      color: var(--accent);
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.14s;
      flex-shrink: 0;
      padding: 0;
    }

    .vol-btn:hover {
      background: rgba(232, 184, 75, 0.18);
    }

    .vol-btn.playing {
      background: rgba(232, 184, 75, 0.28);
      border-color: var(--accent);
      animation: pulse 0.75s infinite;
    }

    .char-box {
      width: 155px;
      height: 155px;
      border: 2px solid var(--accent);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
    }

    .char-box::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .char-box::after {
      content: '';
      position: absolute;
      height: 100%;
      width: 1px;
      background: var(--border);
    }

    .hanzi-xl {
      font-family: 'Noto Serif SC', serif;
      font-size: 6rem;
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    .pinyin-big {
      font-size: 1.55rem;
      color: var(--accent);
      letter-spacing: 2px;
      font-family: 'Space Mono', monospace;
    }

    .sentence-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem;
    }

    .s-cn {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 0.22rem;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }

    .s-py {
      font-size: 0.68rem;
      color: var(--accent);
      margin-bottom: 0.22rem;
    }

    .s-tr {
      font-size: 0.72rem;
      color: var(--text2);
    }

    #graph-container {
      width: 100%;
      height: 490px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      position: relative;
    }

    .graph-empty {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: var(--text2);
    }

    .graph-empty .big {
      font-family: 'Noto Serif SC', serif;
      font-size: 5rem;
      opacity: 0.07;
    }

    .fc-scene {
      perspective: 1000px;
      width: 360px;
      max-width: 90vw;
      height: 460px;
      cursor: pointer;
    }

    .fc-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.48s cubic-bezier(.4, 0, .2, 1);
    }

    .fc-inner.flipped {
      transform: rotateY(180deg);
    }

    .fc-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      padding: 1.7rem;
    }

    .fc-front {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .fc-back {
      background: var(--surface2);
      border: 1px solid var(--accent);
      transform: rotateY(180deg);
    }

    .qz-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .qz-opt {
      padding: 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface2);
      cursor: pointer;
      font-family: 'Noto Serif SC', serif;
      font-size: 1.9rem;
      text-align: center;
      transition: all 0.12s;
      color: var(--text);
    }

    .qz-opt:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(232, 184, 75, 0.07);
    }

    .qz-opt.correct {
      border-color: var(--green);
      background: rgba(76, 175, 125, 0.12);
      color: var(--green);
    }

    .qz-opt.wrong {
      border-color: var(--red);
      background: rgba(217, 79, 61, 0.12);
      color: var(--red);
    }

    .qz-opt:disabled {
      cursor: default;
    }

    .score-bar {
      display: flex;
      gap: 0.2rem;
      align-items: center;
    }

    .score-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
    }

    .score-dot.hit {
      background: var(--green);
    }

    .score-dot.miss {
      background: var(--red);
    }

    .blocks-area {
      min-height: 64px;
      border: 1px dashed var(--border);
      border-radius: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 0.42rem;
      padding: 0.65rem;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s;
    }

    .blocks-area.correct {
      border-color: var(--green);
      background: rgba(76, 175, 125, 0.05);
    }

    .blocks-area.wrong {
      border-color: var(--red);
      background: rgba(217, 79, 61, 0.05);
    }

    .block-btn {
      padding: 0.42rem 0.8rem;
      font-family: 'Noto Serif SC', serif;
      font-size: 1.15rem;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.12s;
    }

    .block-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .block-btn.placed {
      background: rgba(232, 184, 75, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 250px 1fr 380px;
      gap: 1.2rem;
    }

    @media(max-width:1100px) {
      .grid-3 {
        grid-template-columns: 260px 1fr;
      }
    }

    @media(max-width:700px) {
      .grid-3 {
        grid-template-columns: 1fr;
      }
    }

    .muted {
      color: var(--text2);
      font-size: 0.7rem;
    }

    .tag {
      font-size: 0.57rem;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      color: var(--text2);
    }

    .tag-accent {
      border-color: rgba(232, 184, 75, 0.38);
      color: var(--accent);
    }

    .fade-in {
      animation: fadeUp 0.26s ease;
    }

    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 0.5rem 0.85rem;
      pointer-events: none;
      font-size: 0.7rem;
      z-index: 9999;
      display: none;
    }

    #tooltip .t-hz {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.35rem;
      color: var(--text);
    }

    #tooltip .t-py {
      color: var(--accent);
    }

    #tooltip .t-mn {
      color: var(--text2);
      margin-top: 0.12rem;
      font-size: 0.62rem;
    }

    /* ── Video Cards ── */
    .video-card {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.52rem 0.65rem;
      text-decoration: none;
      transition: border-color 0.15s;
      margin-bottom: 0.32rem;
    }

    .video-card:hover {
      border-color: var(--red);
    }

    .video-thumb {
      width: 48px;
      height: 34px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a1f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .video-title {
      font-size: 0.62rem;
      color: var(--text);
      line-height: 1.35;
      flex: 1;
    }

    .video-badge {
      font-size: 0.5rem;
      padding: 0.08rem 0.26rem;
      border-radius: 3px;
      background: rgba(217, 79, 61, 0.18);
      color: #e05c4a;
      border: 1px solid rgba(217, 79, 61, 0.3);
      flex-shrink: 0;
    }

    /* ── Anki Tab ── */
    .anki-drop {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
    }

    .anki-drop:hover,
    .anki-drop.over {
      border-color: var(--accent);
      background: rgba(232, 184, 75, 0.05);
    }

    .anki-drop .big-icon {
      font-size: 2.8rem;
      margin-bottom: 0.65rem;
    }

    .anki-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.65rem;
      font-size: 0.62rem;
      color: var(--text2);
    }

    .anki-stat span {
      color: var(--accent);
      font-weight: 700;
    }

    .anki-card-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.5rem 0.65rem;
      border-radius: 7px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.12s;
    }

    .anki-card-row:hover {
      background: var(--surface2);
    }

    .anki-card-row .a-front {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.2rem;
      color: var(--text);
      min-width: 2.5rem;
    }

    .anki-card-row .a-back {
      font-size: 0.65rem;
      color: var(--text2);
      flex: 1;
    }

    .stroke-box {
      width: 155px;
      height: 155px;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: crosshair;
      margin-top: 0.5rem;
      border-radius: 8px;
    }

    .pill[data-unit] {
      border-color: rgba(232, 184, 75, 0.4);
      color: var(--accent);
    }

    .pill[data-unit].active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>

<body style="display:flex;flex-direction:column;min-height:100vh">

  <!-- TTS Status Bar -->
  <!-- TTS Status Bar Removed -->
  <div id="tts-bar" style="display:none"></div>
  <header>
    <div class="logo">汉语学习<span>ÇİNCE ÖĞREN</span></div>
    <nav id="nav">
      <button class="active" data-tab="dictionary">📖 Sözlük</button>
      <button data-tab="flashcards">🃏 Flashcard</button>
      <button data-tab="sentences">🧩 Cümle</button>
      <button data-tab="quiz">❓ Quiz</button>

    </nav>
  </header>

  <main id="main" style="flex:1;padding:1.4rem;max-width:1400px;margin:0 auto;width:100%"></main>

  <div id="tooltip">
    <div class="t-hz" id="tt-hz"></div>
    <div class="t-py" id="tt-py"></div>
    <div class="t-mn" id="tt-mn"></div>
  </div>

  <script>
    // ══════════════════════════════════════════════════════════════
    //  CONFIG — Render deploy sonrası kendi URL'ini localStorage'a kaydeder
    // ══════════════════════════════════════════════════════════════
    const CONFIG_KEY = 'tts_server_url';

    function getSavedServer() {
      return localStorage.getItem(CONFIG_KEY) || '';
    }
    function saveServer(url) {
      localStorage.setItem(CONFIG_KEY, url.trim().replace(/\/$/, ''));
    }

    // ══════════════════════════════════════════════════════════════
    //  TTS ENGINE
    // ══════════════════════════════════════════════════════════════
    const TTS = (() => {
      function wsSpeak(text, btn) {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'zh-CN'; u.rate = 0.85;
        const v = window.speechSynthesis.getVoices().find(v => v.lang.startsWith('zh'));
        if (v) u.voice = v;
        if (btn) btn.classList.add('playing');
        u.onend = u.onerror = () => { if (btn) btn.classList.remove('playing'); };
        window.speechSynthesis.speak(u);
      }
      return {
        init: async () => { },
        speak: (text, btn = null) => {
          wsSpeak(text, btn);
        }
      };
    })();

    // Tekrarçalınma takibi: aynı metin 4 saniye içinde tekrar çalınırsa yavaş mod
    let _lastSpokenText = '', _lastSpokenAt = 0;
    const speak = (t, b) => {
      if (!t) return;
      const now = Date.now();
      const isRepeat = (t === _lastSpokenText) && (now - _lastSpokenAt < 4000);
      _lastSpokenText = t;
      _lastSpokenAt = now;

    function filterWords() {
      const l = S.hskLevel;
      const u = S.unitFilter || 'all';
      let filtered = l === 'all' ? WORDS : l === '1-2' ? WORDS.filter(w => w.hsk <= 2) : l === '3-4' ? WORDS.filter(w => w.hsk >= 3 && w.hsk <= 4) : WORDS.filter(w => w.hsk >= 5);

      if (u !== 'all') {
        filtered = filtered.filter(w => w.unit == u || (u == 7 && w.unit == 8)); // 7 & 8 are combined usually
      }
      S.words = filtered;
    }

    // Bir bileşik kelimenin tüm karakterlerini döndürür (WORDS'te varsa)
    function compoundChars(comp) {
      const chars = [];
      for (const ch of comp) {
        if (WORDS.find(x => x.hanzi === ch)) chars.push(ch);
      }
      return chars;
    }

      if (!center) return null;
      const nodes = [], links = [], seen = new Set();
      // add(word, isCenter, type) - type: 'center'|'compound'|'char'|'unit'|'mdbg'
      const add = (w, iC = false, type = 'local') => {
        if (seen.has(w.hanzi)) return;
        seen.add(w.hanzi);
        nodes.push({ id: w.hanzi, pinyin: w.pinyin, meaning: w.tr || w.en, hsk: w.hsk, isCenter: iC, nodeType: type });
      };
      add(center, true, 'center');

      // 1️⃣ Compound connections (legacy)
      (center.compounds || []).forEach(c => {
        const chars = compoundChars(c);
        if (chars.length >= 2) {
          chars.forEach((ch, i) => {
            const w = WORDS.find(x => x.hanzi === ch) || { hanzi: ch, pinyin: '', tr: '', en: '', hsk: center.hsk, compounds: [] };
            add(w, false, 'compound');
            if (i > 0) links.push({ source: chars[i - 1], target: ch, ltype: 'compound' });
            if (ch !== center.hanzi && i === 0) links.push({ source: center.hanzi, target: ch, ltype: 'compound' });
          });
        } else {
          const w = WORDS.find(x => x.hanzi === c) || { hanzi: c, pinyin: '', tr: '', en: '', hsk: center.hsk, compounds: [] };
          add(w, false, 'compound');
          links.push({ source: center.hanzi, target: c, ltype: 'compound' });
        }
      });

      // 2️⃣ Shared character connections - words that share characters with center
      const centerChars = [...new Set([...center.hanzi])];
      centerChars.forEach(ch => {
        WORDS.forEach(w => {
          if (w.hanzi === center.hanzi || seen.has(w.hanzi)) return;
          if (w.hanzi.includes(ch)) {
            add(w, false, 'char');
            links.push({ source: center.hanzi, target: w.hanzi, ltype: 'char', shared: ch });
          }
        });
      });

      // 3️⃣ Reverse: words whose compounds include center
      WORDS.forEach(w => {
        if (w.hanzi === center.hanzi) return;
        if ((w.compounds || []).includes(center.hanzi) && !seen.has(w.hanzi)) {
          add(w, false, 'compound');
          links.push({ source: w.hanzi, target: center.hanzi, ltype: 'compound' });
        }
      });

      // 4️⃣ Same-unit context connections (same lesson = likely related semantically)
      // Limit to 5 to avoid cluttering, pick alphabetically closest
      const unitNeighbors = WORDS
        .filter(w => w.unit === center.unit && w.hanzi !== center.hanzi && !seen.has(w.hanzi))
        .slice(0, 5);
      unitNeighbors.forEach(w => {
        add(w, false, 'unit');
        links.push({ source: center.hanzi, target: w.hanzi, ltype: 'unit' });
      });

      return { nodes, links };
    }

    // ── mdbg.net async enrichment ─────────────────────────────────────────────
    async function fetchMDBGWords(hanzi) {
      const proxy = 'https://corsproxy.io/?' + encodeURIComponent('https://www.mdbg.net/chinese/dictionary?search=' + encodeURIComponent(hanzi) + '&searchp=simplified&page=1&pagesize=10');
      const resp = await fetch(proxy, { signal: AbortSignal.timeout(7000) });
      if (!resp.ok) throw new Error('MDBG fetch failed');
      const html = await resp.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const results = [];
      // mdbg.net uses <div class="entry_jap"> or table.ce with tr.row
      doc.querySelectorAll('table.ce tr.row').forEach(row => {
        const hz  = row.querySelector('.simplified, .head')?.textContent?.trim()?.split(' ')[0];
        const py  = row.querySelector('.pinyin')?.textContent?.trim();
        const def = row.querySelector('.explanation')?.textContent?.trim()?.split('/')[0]?.trim();
        if (hz && hz !== hanzi && /^[一-鿿]+$/.test(hz)) results.push({ hanzi: hz, pinyin: py || '', meaning: def || '' });
      });
      return results.slice(0, 8);
    }

    async function enrichGraphFromMDBG(center) {
      const el = document.getElementById('graph-container');
      const btn = document.getElementById('mdbg-enrich-btn');
      if (btn) { btn.textContent = '⏳ Yükleniyor...'; btn.disabled = true; }
      try {
        const extraWords = await fetchMDBGWords(center.hanzi);
        if (!extraWords.length) { if (btn) btn.textContent = '✗ Bulunamadı'; return; }
        // Add MDBG words to graph as ghost nodes
        const existing = el?.__graphData;
        if (!existing) return;
        extraWords.forEach(w => {
          if (!existing.nodes.find(n => n.id === w.hanzi)) {
            existing.nodes.push({ id: w.hanzi, pinyin: w.pinyin, meaning: w.meaning, hsk: 0, isCenter: false, nodeType: 'mdbg' });
            existing.links.push({ source: center.hanzi, target: w.hanzi, ltype: 'mdbg' });
          }
        });
        renderGraphFromData(center, existing);
        if (btn) { btn.textContent = '✓ mdbg yüklendi'; }
      } catch(e) {
        console.warn('MDBG enrich failed:', e);
        if (btn) { btn.textContent = '✗ Bağlanamadı'; btn.disabled = false; }
      }
    }

    function renderGraph(center) {
      const el = document.getElementById('graph-container'); if (!el) return;
      el.innerHTML = '';
      if (!center) { el.innerHTML = `<div class="graph-empty"><div class="big">学</div><p class="muted">Kelime seçin veya arama yapın</p></div>`; return; }
      const data = buildGraph(center);
      if (!data || !data.nodes.length) { el.innerHTML = `<div class="graph-empty"><p class="muted">Bağlantı bulunamadı</p></div>`; return; }
      const W = el.clientWidth || 700, H = el.clientHeight || 490;
      const svg = d3.select(el).append('svg').attr('viewBox', `0 0 ${W} ${H}`);
      svg.append('defs').append('marker').attr('id', 'arr').attr('viewBox', '0 -5 10 10').attr('refX', 24).attr('refY', 0).attr('markerWidth', 5).attr('markerHeight', 5).attr('orient', 'auto').append('path').attr('d', 'M0,-5L10,0L0,5').attr('fill', 'rgba(232,184,75,0.45)');
      const g = svg.append('g');
      svg.call(d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform)));
      if (sim) sim.stop();
      sim = d3.forceSimulation(data.nodes).force('link', d3.forceLink(data.links).id(d => d.id).distance(105)).force('charge', d3.forceManyBody().strength(-260)).force('center', d3.forceCenter(W / 2, H / 2)).force('collision', d3.forceCollide(44));
      el.__graphData = data; // save for MDBG enrichment
      const linkColor = d => d.ltype === 'unit' ? 'rgba(59,130,246,0.35)' : d.ltype === 'char' ? 'rgba(16,185,129,0.35)' : d.ltype === 'mdbg' ? 'rgba(239,68,68,0.35)' : 'rgba(232,184,75,0.28)';
      const link = g.append('g').selectAll('line').data(data.links).enter().append('line').attr('stroke', linkColor).attr('stroke-width', 1.5).attr('marker-end', 'url(#arr)');
      const nd = g.append('g').selectAll('g').data(data.nodes).enter().append('g').style('cursor', 'pointer').call(d3.drag().on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }).on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; }).on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));
      nd.append('circle')
        .attr('r', d => d.isCenter ? 35 : (d.nodeType === 'mdbg' ? 20 : 25))
        .attr('fill', d => d.isCenter ? 'rgba(232,184,75,0.14)' : d.nodeType === 'mdbg' ? 'rgba(239,68,68,0.07)' : d.nodeType === 'unit' ? 'rgba(59,130,246,0.07)' : d.nodeType === 'char' ? 'rgba(16,185,129,0.07)' : 'rgba(34,34,40,0.96)')
        .attr('stroke', d => d.isCenter ? '#e8b84b' : d.nodeType === 'mdbg' ? '#ef4444' : d.nodeType === 'unit' ? '#3b82f6' : d.nodeType === 'char' ? '#10b981' : '#3e3e48')
        .attr('stroke-width', d => d.isCenter ? 2 : 1)
        .attr('stroke-dasharray', d => d.nodeType === 'mdbg' ? '3,2' : 'none');
      nd.append('text').attr('text-anchor', 'middle').attr('dominant-baseline', 'central').attr('font-family', 'Noto Serif SC,serif').attr('font-size', d => d.isCenter ? '1.3rem' : '0.95rem').attr('fill', d => d.isCenter ? '#e8b84b' : '#f0ede6').text(d => d.id);
      nd.append('text').attr('text-anchor', 'middle').attr('y', d => d.isCenter ? 48 : 35).attr('font-family', 'Space Mono,monospace').attr('font-size', '0.5rem').attr('fill', '#9a9890').text(d => d.pinyin);
      nd.on('click', (e, d) => { const w = WORDS.find(x => x.hanzi === d.id); if (w) { S.selected = w; renderGraph(w); renderDetail(); updWL(); } });
      const tt = document.getElementById('tooltip');
      nd.on('mouseover', (e, d) => { document.getElementById('tt-hz').textContent = d.id; document.getElementById('tt-py').textContent = d.pinyin; document.getElementById('tt-mn').textContent = d.meaning || ''; tt.style.display = 'block'; }).on('mousemove', e => { tt.style.left = (e.clientX + 13) + 'px'; tt.style.top = (e.clientY - 8) + 'px'; }).on('mouseout', () => { tt.style.display = 'none'; });
      sim.on('tick', () => { link.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y); nd.attr('transform', d => `translate(${d.x},${d.y})`); });
    }

        ${vidHtml}
        ${c.hsk ? `<div class="tag" style="margin-top:0.3rem">HSK ${c.hsk}</div>` : ''}
        <div id="stroke-seq-container" style="margin-top:1rem; padding-top:0.8rem; border-top:1px solid var(--border); width:100%; text-align:center;">
          <div class="muted" style="font-size:0.55rem;letter-spacing:2px;margin-bottom:0.5rem">ADIM ADIM ÇİZİM</div>
          ${[...c.hanzi].map((ch, ci) => `
            <div style="display:inline-block;margin:0 6px;vertical-align:top;">
              <button class="char-audio-btn" data-ch="${ch}" style="background:none;border:none;cursor:pointer;color:var(--accent);font-family:'Noto Serif SC',serif;font-size:1rem;display:block;width:100%;margin-bottom:4px;">🔊 ${ch}</button>
              <div id="stroke-seq-${ci}" style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center;"></div>
            </div>
          `).join('')}
        </div>
      </div>
    </div></div>
    <div style="display:flex;gap:0.6rem"><button class="btn" id="fprev">← Önceki</button><button class="btn btn-accent" id="fnext">Sonraki →</button></div>
  </div>`;
      if (c.hanzi.length === 1 && document.getElementById('flash-stroke')) {
        renderStroke('flash-stroke', c.hanzi);
      }

      // Render stroke sequence for each character
      const renderCharStrokes = (ch, targetId) => {
        HanziWriter.loadCharacterData(ch).then(function (charData) {
          const target = document.getElementById(targetId);
          if (!target) return;
          target.innerHTML = '';
          const W = 38, H = 38, P = 3;
          for (let i = 0; i < charData.strokes.length; i++) {
            const strokesPortion = charData.strokes.slice(0, i + 1);
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.style.width = W + 'px'; svg.style.height = H + 'px';
            svg.style.border = '1px solid var(--border)';
            svg.style.borderRadius = '4px'; svg.style.background = 'var(--surface)';
            const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            const td = HanziWriter.getScalingTransform(W, H, P);
            group.setAttribute('transform', td.transform);
            svg.appendChild(group);
            strokesPortion.forEach(function (strokePath, index) {
              const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
              path.setAttribute('d', strokePath);
              path.style.fill = index === strokesPortion.length - 1 ? '#ef4444' : '#a1a1aa';
              group.appendChild(path);
            });
            target.appendChild(svg);
          }
        }).catch(err => console.log('HanziWriter chart err:', err));
      };
      [...c.hanzi].forEach((ch, ci) => {
        renderCharStrokes(ch, 'stroke-seq-' + ci);
      });
      document.querySelectorAll('.char-audio-btn').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); speak(btn.dataset.ch, btn); });
      });
      document.getElementById('fc').addEventListener('click', () => { S.flashFlipped = !S.flashFlipped; renderFlash(); });
      document.getElementById('fprev').addEventListener('click', e => { e.stopPropagation(); S.flashIdx = (S.flashIdx - 1 + pool.length) % pool.length; S.flashFlipped = false; renderFlash(); });
      document.getElementById('fnext').addEventListener('click', e => { e.stopPropagation(); S.flashIdx = (S.flashIdx + 1) % pool.length; S.flashFlipped = false; renderFlash(); });
      ['fv1', 'fv2'].forEach(id => { const b = document.getElementById(id); if (b) b.addEventListener('click', e => { e.stopPropagation(); speak(c.hanzi, b); }); }); if (document.getElementById('fv_ex')) { const bex = document.getElementById('fv_ex'); bex.addEventListener('click', e => { e.stopPropagation(); speak(exs[0].cn, bex); }); }

    }

    // ── SENTENCES ─────────────────────────────────────────────────
    function initSent() {
      const s = SENTENCES[S.sentIdx];
      let bl = s.blocks.map(w => ({ w, isDecoy: false }));

      // Add 1-2 random decoy words from vocabulary to make it harder
      const numDecoys = Math.floor(Math.random() * 2) + 1;
      const pool = S.words.length > 5 ? S.words : WORDS;
      for (let i = 0; i < numDecoys; i++) {
        const decoy = pool[Math.floor(Math.random() * pool.length)].hanzi;
        // only add if it's not already in the sentence
        if (!s.cn.includes(decoy) && decoy.length > 0) {
          bl.push({ w: decoy, isDecoy: true });
        }
      }

      // Shuffle
      for (let i = bl.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bl[i], bl[j]] = [bl[j], bl[i]];
      }

      S.sentAvail = bl;
      S.sentUser = [];
      S.sentStatus = 'idle';
    }
    function renderSent() {
      if (!S.sentAvail.length && !S.sentUser.length) initSent();
      const s = SENTENCES[S.sentIdx];
      document.getElementById('main').innerHTML = `
    <div style="max-width:640px;margin:0 auto;display:flex;flex-direction:column;gap:1.15rem">
      <div class="card">
        <div style="text-align:center;margin-bottom:1.2rem;position:relative">
          <div class="muted" style="font-size:0.58rem;letter-spacing:3px;margin-bottom:0.42rem">TÜRKÇEDEN ÇİNCEYE</div>
          <div style="font-size:1.4rem;color:var(--text);line-height:1.4">${s.tr}</div>
          <div class="muted" style="margin-top:0.42rem">${S.sentIdx + 1}/${SENTENCES.length}</div>
          ${S.sentStatus !== 'correct' ? `<button class="btn btn-sm" id="hint-btn" style="position:absolute;right:0;top:0" title="İpucu Ver">💡 İpucu</button>` : ''}
        </div>
        
        <div class="blocks-area ${S.sentStatus}" id="drop">
          ${!S.sentUser.length ? `<span class="muted">Kelimeleri sıraya koy...</span>` : ''}
          ${S.sentUser.map((b, i) => `<button class="block-btn placed" data-i="${i}" data-src="u">${b.w}</button>`).join('')}
        </div>
        
        <div style="display:flex;flex-wrap:wrap;gap:0.42rem;justify-content:center;margin:0.85rem 0; min-height: 50px;">
          ${S.sentAvail.map((b, i) => `<button class="block-btn" data-i="${i}" data-src="a">${b.w}</button>`).join('')}
        </div>
        
        <div style="display:flex;gap:0.6rem;justify-content:center;margin-top:1rem">
          ${S.sentStatus === 'correct' ? `<button class="btn" id="sl">🔊 Dinle</button><button class="btn btn-accent" id="sn">Sonraki →</button>` : `<button class="btn btn-accent" id="sc">✓ Kontrol Et</button><button class="btn btn-sm" id="sr" title="Sıfırla">↺</button>`}
        </div>
        
        ${S.sentStatus === 'correct' ? `<div style="text-align:center;margin-top:0.85rem;color:var(--green);font-size:0.9rem;font-weight:bold">✓ Harika! Doğru sıralama.</div><div style="text-align:center;color:var(--accent);font-size:0.8rem;margin-top:0.3rem">${s.py}</div><div style="text-align:center;color:var(--text);font-family:'Noto Serif SC',serif;font-size:1.2rem;margin-top:0.3rem">${s.cn}</div>` : S.sentStatus === 'wrong' ? `<div style="text-align:center;margin-top:0.85rem;color:var(--red);font-size:0.85rem">✗ Yanlış sıralama, tekrar dene</div>` : ''}
      </div>
      
      <div class="card" style="padding:0.85rem">
        <div class="muted" style="font-size:0.58rem;letter-spacing:2px;margin-bottom:0.6rem;display:flex;justify-content:space-between">
          <span>TÜM CÜMLELER</span>
          <span style="color:var(--accent)">${SENTENCES.length} Cümle</span>
        </div>
        <div style="max-height: 400px; overflow-y: auto;">
          ${SENTENCES.map((sen, i) => `<div class="word-row ${i === S.sentIdx ? 'selected' : ''}" data-si="${i}" style="padding:0.42rem 0.55rem"><span class="muted" style="min-width:1.2rem;font-size:0.58rem">${i + 1}</span><span style="font-family:'Noto Serif SC',serif;color:var(--text);font-size:1rem;">${sen.cn}</span><span class="muted" style="flex:1;padding-left:0.5rem;font-size:0.75rem">${sen.tr}</span><button class="vol-btn" style="width:25px;height:25px;font-size:0.68rem" data-speak="${sen.cn}">🔊</button></div>`).join('')}
        </div>
      </div>
    </div>`;

      document.querySelectorAll('[data-src]').forEach(b => b.addEventListener('click', () => {
        const i = +b.dataset.i, src = b.dataset.src;
        if (src === 'a') {
          S.sentUser.push(S.sentAvail.splice(i, 1)[0]);
        } else {
          S.sentAvail.push(S.sentUser.splice(i, 1)[0]);
        }
        S.sentStatus = 'idle';
        renderSent();
      }));

      document.getElementById('sc')?.addEventListener('click', () => {
        const uStr = S.sentUser.map(x => x.w).join('');
        const cStr = s.blocks.join('');
        S.sentStatus = uStr === cStr ? 'correct' : 'wrong';
        if (S.sentStatus === 'correct') speak(s.cn);
        renderSent();
      });
      document.getElementById('sr')?.addEventListener('click', () => { S.sentAvail = []; S.sentUser = []; renderSent(); });
      document.getElementById('sl')?.addEventListener('click', () => speak(s.cn));
      document.getElementById('sn')?.addEventListener('click', () => { S.sentIdx = (S.sentIdx + 1) % SENTENCES.length; S.sentAvail = []; S.sentUser = []; renderSent(); });

      document.getElementById('hint-btn')?.addEventListener('click', () => {
        // Find the first incorrect block or missing block
        const correctBlocks = s.blocks;
        let targetIndex = S.sentUser.length;

        // If they already have blocks, check if they are correct so far
        for (let i = 0; i < S.sentUser.length; i++) {
          if (S.sentUser[i].w !== correctBlocks[i]) {
            targetIndex = i;
            break;
          }
        }

        if (targetIndex < correctBlocks.length) {
          const neededWord = correctBlocks[targetIndex];
          // Find it in avail
          const idxInAvail = S.sentAvail.findIndex(x => x.w === neededWord && !x.isDecoy);
          if (idxInAvail !== -1) {
            const block = S.sentAvail.splice(idxInAvail, 1)[0];
            // If we are replacing a wrong block
            if (targetIndex < S.sentUser.length) {
              // Return all blocks from targetIndex onwards back to avail
              const removed = S.sentUser.splice(targetIndex);
              S.sentAvail.push(...removed);
            }
            S.sentUser.push(block);
            S.sentStatus = 'idle';
            renderSent();
          }
        }
      });

      document.querySelectorAll('[data-si]').forEach(r => r.addEventListener('click', e => { if (e.target.dataset.speak) return; S.sentIdx = +r.dataset.si; S.sentAvail = []; S.sentUser = []; renderSent(); }));
      document.querySelectorAll('[data-speak]').forEach(b => b.addEventListener('click', e => { e.stopPropagation(); speak(b.dataset.speak, b); }));
    }

    // ── QUIZ ──────────────────────────────────────────────────────
    function initQuiz() {
      const pool = S.words.length >= 4 ? S.words : WORDS;
      if (S.quizOrder.length !== pool.length) {
        S.quizOrder = pool.map((_, i) => i).sort(() => 0.5 - Math.random());
        S.quizIdx = 0;
      }
      const c = pool[S.quizOrder[S.quizIdx % pool.length]];
      const w = pool.filter(x => x.hanzi !== c.hanzi).sort(() => 0.5 - Math.random()).slice(0, 3);
      S.quizOptions = [c, ...w].sort(() => 0.5 - Math.random());
      S.quizAnswered = false; S.quizSelected = null;
    }
    function renderQuiz() {
      if (!S.quizOptions.length) initQuiz();
      const pool = S.words.length >= 4 ? S.words : WORDS, c = pool[S.quizIdx % pool.length];
      document.getElementById('main').innerHTML = `
    <div style="max-width:460px;margin:0 auto;display:flex;flex-direction:column;gap:1.1rem">
      <div style="display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap"><div class="level-pills">${levelPills()}</div></div>
      <div class="score-bar">${S.quizScore.slice(-12).map(h => `<div class="score-dot ${h ? 'hit' : 'miss'}"></div>`).join('')}${S.quizScore.length ? `<span class="muted" style="margin-left:0.38rem">${S.quizScore.filter(Boolean).length}/${S.quizScore.length}</span>` : ''}</div>
      <div class="card" style="text-align:center">
        <div class="muted" style="font-size:0.58rem;letter-spacing:3px;margin-bottom:0.85rem">HANGİ KARAKTER?</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:0.85rem;margin-bottom:0.85rem">
          <div style="font-size:1.6rem;color:var(--accent);font-family:'Space Mono',monospace">${c.pinyin}</div>
          <button class="vol-btn" id="qv">🔊</button>
        </div>
        <div style="color:var(--text2);font-size:0.8rem;margin-bottom:1.2rem">${c.tr || c.en}</div>
        <div class="qz-grid">${S.quizOptions.map((opt, i) => { let cls = ''; if (S.quizAnswered) cls = opt.hanzi === c.hanzi ? 'correct' : opt.hanzi === S.quizSelected?.hanzi ? 'wrong' : ''; return `<button class="qz-opt ${cls}" data-qi="${i}" ${S.quizAnswered ? 'disabled' : ''}>${opt.hanzi}</button>`; }).join('')}</div>
        ${S.quizAnswered ? `<div style="margin-top:1rem"><div style="color:${S.quizSelected?.hanzi === c.hanzi ? 'var(--green)' : 'var(--red)'};margin-bottom:0.6rem;font-size:0.82rem">${S.quizSelected?.hanzi === c.hanzi ? '✓ Doğru!' : '✗ Yanlış — Doğrusu: ' + c.hanzi}</div><button class="btn btn-accent" id="qn">Sonraki →</button></div>` : ''}
      </div>
    </div>`;
      document.getElementById('qv')?.addEventListener('click', () => { const b = document.getElementById('qv'); speak(c.hanzi, b); });
      document.querySelectorAll('.qz-opt').forEach(b => b.addEventListener('click', () => { if (S.quizAnswered) return; S.quizSelected = S.quizOptions[+b.dataset.qi]; S.quizAnswered = true; const hit = S.quizSelected.hanzi === c.hanzi; S.quizScore.push(hit); if (hit) speak(c.hanzi, b); renderQuiz(); }));
      document.getElementById('qn')?.addEventListener('click', () => { S.quizIdx++; S.quizOptions = []; initQuiz(); renderQuiz(); });

    }

    // ══════════════════════════════════════════════════════════════
    //  BOOT
    // ══════════════════════════════════════════════════════════════
    document.querySelectorAll('#nav button').forEach(b => b.addEventListener('click', () => { S.tab = b.dataset.tab; render(); }));
    window.addEventListener('load', async () => {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
      filterWords();
      await TTS.init();
      render();
    });
  </script>
</body>

</html>
