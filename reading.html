<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çince Okuma Pratiği - ChinesePracticeWeb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific overrides for reading page */
    body { overflow-x: hidden; }
    header { border-bottom: 1px solid var(--rim); }
    main { padding-top: 2rem; }
  </style>
</head>
<body>
  <div id="mountain-bg">
    <svg viewBox="0 0 1200 400" preserveAspectRatio="none">
      <path d="M0,400 L0,280 Q150,220 300,300 T600,240 T900,320 T1200,200 L1200,400 Z" fill="#0c1428" opacity="0.6"/>
      <path d="M0,400 L0,320 Q200,280 400,340 T800,260 T1200,340 L1200,400 Z" fill="#080e1e"/>
    </svg>
  </div>

  <header>
    <a href="index.html" class="logo">
      <div class="logo-hanzi">漢語</div>
      <div class="logo-right">
        <div class="logo-title">Okuma Pratiği</div>
        <div class="logo-subtitle">Reading Practice</div>
      </div>
    </a>
    <nav>
      <button onclick="location.href='index.html'">🏠 Ana Sayfa</button>
      <button class="active">📚 Okuma</button>
      <button id="theme-toggle">🌙</button>
    </nav>
  </header>

  <main>
    <div class="reading-container">
      <div id="story-tabs">
        <!-- Tabs will be injected here -->
      </div>

      <div class="reading-card">
        <div class="reading-header">
          <h2 id="story-title">Yükleniyor...</h2>
          <div class="reading-controls">
            <div class="speed-ctrl">
              <span class="speed-val" id="speed-val">1.0x</span>
              <input type="range" id="speed-range" min="0.4" max="1.6" step="0.1" value="1.0">
            </div>
            <button id="speak-btn" onclick="speakStory()"><span>🔊 Dinle</span></button>
            <button class="tab-btn" onclick="stopStory()">⏹️ Durdur</button>
          </div>
        </div>
        
        <div class="reading-content" id="story-body">
          <!-- Story content will be injected here -->
        </div>

        <div class="story-footer" id="story-questions">
          <!-- Questions will be injected here -->
        </div>
      </div>

      <div class="vocab-section" id="story-vocab">
        <!-- Vocab units will be injected here -->
      </div>
    </div>
  </main>

  <script src="reading_data.js"></script>
  <script src="reading.js"></script>
  <script>
    // Theme toggle handling (consistent with main app)
    const tb = document.getElementById('theme-toggle');
    const he = document.documentElement;
    function setTheme(t) { 
      he.setAttribute('data-theme', t); 
      tb.textContent = t === 'dark' ? '☀️' : '🌙'; 
      localStorage.setItem('hz-theme', t); 
    }
    setTheme(localStorage.getItem('hz-theme') || 'dark');
    tb.addEventListener('click', () => setTheme(he.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));
  </script>
</body>
</html>
